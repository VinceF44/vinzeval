<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Évaluation — Formulaire d'Évaluation Croisée & Auto-Évaluation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-3 sm:p-6 md:p-8 flex items-center justify-center relative">

    <div id="bloc-principal-evaluation" class="w-full max-w-5xl bg-gray-900 p-4 sm:p-6 rounded-2xl border border-gray-800 space-y-6 shadow-2xl transition-all">
        
        <div id="ecran-formulaire" class="space-y-6">
            <div class="sticky top-0 bg-gray-900 z-30 border-b border-gray-800 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pt-2">
                <div>
                    <span class="bg-blue-950/50 text-blue-400 text-[10px] font-bold uppercase px-2 py-0.5 rounded border border-blue-800/50">📝 Espace Évaluation</span>
                    <h1 id="titre-session-evaluation" class="text-xl font-black text-white mt-1">Chargement de la session...</h1>
                </div>
                
                <div class="flex items-center gap-4 bg-gray-950 px-4 py-2.5 rounded-2xl border border-gray-800 shadow-inner select-none shrink-0 self-end sm:self-auto ring-1 ring-gray-900">
                    <span id="timer-display" class="text-white font-black text-2xl tracking-widest font-mono tabular-nums">00:00</span>
                    <div class="flex items-center gap-2 border-l border-gray-800 pl-3">
                        <button onclick="toggleChrono()" id="btn-timer-play" title="Lancer / Pause" class="h-10 w-10 flex items-center justify-center rounded-xl bg-gray-900 border border-gray-700 hover:bg-gray-800 hover:border-gray-500 text-xl transition-all cursor-pointer shadow-sm active:scale-95">▶️</button>
                        <button onclick="resetChrono()" title="Réinitialiser" class="h-10 w-10 flex items-center justify-center rounded-xl bg-gray-900 border border-gray-700 hover:bg-gray-800 hover:border-gray-500 text-xl transition-all cursor-pointer shadow-sm active:scale-95">🔄</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-40">
                <!-- DROPDOWN CUSTOM : ÉQUIPE VOTANT -->
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Votre équipe (Évaluateur) :</label>
                    <div class="custom-dropdown-container relative w-full text-left">
                        <input type="hidden" id="select-groupe-votant" value="">
                        <button type="button" onclick="toggleDropdown('select-groupe-votant')" class="w-full bg-gray-950 rounded-xl p-3 text-sm font-sans border border-gray-800 text-white flex justify-between items-center focus:outline-none focus:border-blue-500 transition-all cursor-pointer shadow-sm">
                            <span id="select-groupe-votant-label" class="truncate pr-2">-- Choisissez votre équipe --</span>
                            <span class="dropdown-arrow text-xs text-gray-500 transition-transform duration-200" id="select-groupe-votant-arrow">▼</span>
                        </button>
                        <div id="select-groupe-votant-menu" class="custom-dropdown-menu hidden absolute left-0 mt-2 w-full rounded-xl border border-gray-700 bg-gray-900/95 backdrop-blur-md shadow-2xl p-1.5 max-h-60 overflow-y-auto z-50 transition-all">
                            <!-- Injecté via JS -->
                        </div>
                    </div>
                </div>

                <!-- DROPDOWN CUSTOM : SUJET ÉVALUÉ -->
                <div class="bg-gray-950/40 p-3 rounded-xl border border-gray-800/60">
                    <label class="block text-xs font-bold uppercase text-blue-400 mb-1">Équipe à évaluer :</label>
                    <div class="custom-dropdown-container relative w-full text-left">
                        <input type="hidden" id="select-sujet-evalue" value="">
                        <button type="button" onclick="toggleDropdown('select-sujet-evalue')" class="w-full bg-gray-950 rounded-xl p-3 text-sm font-sans border border-blue-900/50 text-white flex justify-between items-center focus:outline-none focus:border-blue-500 transition-all cursor-pointer shadow-sm">
                            <span id="select-sujet-evalue-label" class="truncate pr-2">Chargement...</span>
                            <span class="dropdown-arrow text-xs text-blue-500/50 transition-transform duration-200" id="select-sujet-evalue-arrow">▼</span>
                        </button>
                        <div id="select-sujet-evalue-menu" class="custom-dropdown-menu hidden absolute left-0 mt-2 w-full rounded-xl border border-blue-800/60 bg-gray-900/95 backdrop-blur-md shadow-2xl p-1.5 max-h-60 overflow-y-auto z-50 transition-all">
                            <!-- Injecté via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="conteneur-criteres-evaluation" class="space-y-5 pt-2 border-t border-gray-800/60 relative z-10"></div>

            <div class="pt-4 border-t border-gray-800/60 space-y-1.5">
                <label class="block text-xs font-bold uppercase text-gray-400">📝 Feedback Global & Impressions :</label>
                <div class="flex flex-col rounded-xl overflow-hidden border border-gray-800 focus-within:border-blue-500 transition-all">
                    <div class="flex items-center gap-1 bg-gray-950 p-2 border-b border-gray-800 select-none">
                        <button type="button" onclick="appliquerFormatText('bold')" class="h-7 w-8 font-black text-xs rounded hover:bg-gray-800 text-gray-300 transition-all cursor-pointer">B</button>
                        <button type="button" onclick="appliquerFormatText('italic')" class="h-7 w-8 italic text-xs font-bold rounded hover:bg-gray-800 text-gray-300 transition-all cursor-pointer">I</button>
                        <button type="button" onclick="appliquerFormatText('underline')" class="h-7 w-8 underline text-xs font-bold rounded hover:bg-gray-800 text-gray-300 transition-all cursor-pointer">U</button>
                        <button type="button" onclick="appliquerFormatText('insertUnorderedList')" class="h-7 w-8 font-bold text-base rounded hover:bg-gray-800 text-gray-300 transition-all cursor-pointer flex items-center justify-center pb-0.5">•</button>
                    </div>
                    <div id="feedback-global" contenteditable="true" oninput="enregistrerEtatCurseursEnContinu()" placeholder="Vos impressions générales sur la prestation..." class="w-full bg-gray-950/60 p-4 text-sm font-sans leading-relaxed text-white min-h-[150px] focus:outline-none transition-all overflow-y-auto [&_ul]:list-disc [&_ul]:pl-5 [&_i]:italic"></div>
                </div>
            </div>

            <div class="pt-2 relative z-0">
                <button onclick="soumettreEvaluationGenerale()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl transition cursor-pointer shadow-lg shadow-blue-950/50 uppercase text-sm tracking-wider active:scale-[0.99]">
                    🚀 Envoyer toutes nos évaluations
                </button>
            </div>
        </div>

        <div id="ecran-rapport" class="hidden space-y-5 text-center py-4">
            <div class="text-5xl">🎉</div>
            <div>
                <h2 class="text-2xl font-black text-white">Évaluations Émises !</h2>
                <p id="rapport-nom-groupe" class="text-sm text-blue-400 font-semibold mt-1"></p>
            </div>
            <div class="bg-gray-950 p-5 rounded-xl border border-gray-800 text-left space-y-3.5 my-2 max-w-md mx-auto">
                <div class="text-xs font-bold uppercase tracking-wider text-gray-400 border-b border-gray-800 pb-2">📊 Résumé de votre session</div>
                <div class="flex justify-between items-center text-sm"><span class="text-gray-400">Équipes évaluées au total :</span><span id="rapport-nb-groupes" class="font-bold text-white font-mono text-base">0</span></div>
                <div class="flex justify-between items-center text-sm"><span class="text-gray-400">Statut auto-évaluation :</span><span id="rapport-auto-statut" class="font-bold font-mono">Vérification...</span></div>
            </div>
        </div>
    </div>

    <!-- UI MODALS DYNAMIQUES -->
    <div id="ui-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity opacity-0" style="transition: opacity 0.2s;">
        <div class="bg-gray-900 border border-gray-800 w-full max-w-md rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform" id="ui-modal-box" style="transition: transform 0.2s;">
            <div class="p-5 flex items-start gap-4">
                <div id="ui-modal-icon" class="text-3xl shrink-0 mt-1">🔔</div>
                <div class="flex-1 pt-1">
                    <h3 id="ui-modal-title" class="text-base font-black text-white mb-1.5 uppercase tracking-wide">Information</h3>
                    <p id="ui-modal-message" class="text-sm text-gray-400 leading-relaxed"></p>
                    <input type="text" id="ui-modal-input" class="hidden w-full mt-4 bg-gray-950 rounded-xl p-3 text-sm font-sans border border-gray-800 text-gray-100 focus:outline-none focus:border-blue-500 transition-all" />
                </div>
            </div>
            <div class="p-4 bg-gray-950/50 border-t border-gray-800 flex justify-end gap-3" id="ui-modal-actions">
                <button id="ui-btn-cancel" class="hidden px-4 py-2 rounded-xl text-sm font-bold text-gray-400 hover:text-white hover:bg-gray-800 transition-colors cursor-pointer">Annuler</button>
                <button id="ui-btn-confirm" class="px-5 py-2 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md transition-all active:scale-95 cursor-pointer">OK</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        const urlParams = new URLSearchParams(window.location.search);
        const idSessionEvaluation = urlParams.get('session_id');

        let listeCriteres = [];
        let ciblePrecedente = ""; 
        let votantPrecedent = "";
        let memoireEvaluations = {};

        // --- LOGIQUE UI DROPDOWNS CUSTOM ---
        function toggleDropdown(id) {
            const menu = document.getElementById(id + '-menu');
            const arrow = document.getElementById(id + '-arrow');
            
            // Fermer les autres menus ouverts
            document.querySelectorAll('.custom-dropdown-menu').forEach(m => {
                if (m.id !== id + '-menu') m.classList.add('hidden');
            });
            document.querySelectorAll('.dropdown-arrow').forEach(a => {
                if (a.id !== id + '-arrow') a.style.transform = 'rotate(0deg)';
            });

            const isHidden = menu.classList.toggle('hidden');
            arrow.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function selectOption(dropdownId, value, label) {
            const hiddenInput = document.getElementById(dropdownId);
            const labelSpan = document.getElementById(dropdownId + '-label');
            
            const valeurChangee = hiddenInput.value !== value;
            
            hiddenInput.value = value;
            labelSpan.innerText = label;
            
            toggleDropdown(dropdownId);
            
            if (valeurChangee) {
                if (dropdownId === 'select-groupe-votant') changerDeGroupeVotant(value);
                else if (dropdownId === 'select-sujet-evalue') changerDeCibleEvaluation(value);
            }
        }

        // Fermeture automatique en cliquant en dehors
        window.addEventListener('click', function(e) {
            if (!e.target.closest('.custom-dropdown-container')) {
                document.querySelectorAll('.custom-dropdown-menu').forEach(m => m.classList.add('hidden'));
                document.querySelectorAll('.dropdown-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
            }
        });
        // -----------------------------------

        function formaterPrenomInitiale(nomComplet) {
            if (!nomComplet) return "Inconnu";
            const parties = nomComplet.trim().split(/\s+/);
            if (parties.length <= 1) return nomComplet;
            return `${parties[0]} ${parties.slice(1).join(" ").charAt(0).toUpperCase()}.`;
        }

        const UIModal = {
            show: function(options) {
                return new Promise((resolve) => {
                    const modal = document.getElementById('ui-modal');
                    const box = document.getElementById('ui-modal-box');
                    const title = document.getElementById('ui-modal-title');
                    const msg = document.getElementById('ui-modal-message');
                    const icon = document.getElementById('ui-modal-icon');
                    const input = document.getElementById('ui-modal-input');
                    const btnCancel = document.getElementById('ui-btn-cancel');
                    const btnConfirm = document.getElementById('ui-btn-confirm');

                    title.innerText = options.title || 'Information';
                    msg.innerHTML = options.message || '';
                    
                    if(options.type === 'error') { icon.innerText = '❌'; title.className = "text-base font-black text-red-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-white bg-red-600 hover:bg-red-700 shadow-md transition-all active:scale-95 cursor-pointer"; }
                    else if(options.type === 'success') { icon.innerText = '✅'; title.className = "text-base font-black text-emerald-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-md transition-all active:scale-95 cursor-pointer"; }
                    else if(options.type === 'warning') { icon.innerText = '⚠️'; title.className = "text-base font-black text-amber-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-gray-900 bg-amber-500 hover:bg-amber-600 shadow-md transition-all active:scale-95 cursor-pointer"; }
                    else { icon.innerText = 'ℹ️'; title.className = "text-base font-black text-blue-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md transition-all active:scale-95 cursor-pointer"; }

                    if (options.isPrompt) {
                        input.classList.remove('hidden'); input.value = options.defaultValue || ''; setTimeout(() => input.focus(), 100);
                    } else { input.classList.add('hidden'); }

                    if (options.isConfirm || options.isPrompt) btnCancel.classList.remove('hidden'); else btnCancel.classList.add('hidden');
                    btnConfirm.innerText = options.confirmText || 'OK';

                    const cleanup = () => {
                        modal.classList.remove('opacity-100'); box.classList.remove('scale-100');
                        setTimeout(() => modal.classList.add('hidden'), 200);
                        btnConfirm.onclick = null; btnCancel.onclick = null;
                    };

                    btnConfirm.onclick = () => { cleanup(); if (options.isPrompt) resolve(input.value); else resolve(true); };
                    btnCancel.onclick = () => { cleanup(); if (options.isPrompt) resolve(null); else resolve(false); };

                    modal.classList.remove('hidden'); void modal.offsetWidth;
                    modal.classList.add('opacity-100'); box.classList.add('scale-100');
                });
            },
            alert: function(message, type = 'info', title) { return this.show({ message, type, title: title || (type === 'error' ? 'Erreur' : type==='success' ? 'Succès' : type==='warning' ? 'Attention' : 'Information'), isConfirm: false }); },
            confirm: function(message, title = 'Confirmation', type = 'warning') { return this.show({ message, type, title, isConfirm: true, confirmText: 'Confirmer' }); },
            prompt: function(message, defaultValue = '', title = 'Saisie requise') { return this.show({ message, type: 'info', title, isPrompt: true, defaultValue, confirmText: 'Valider' }); }
        };

        let chronoInterval = null;
        let chronoSecondes = 0;

        function toggleChrono() {
            const btn = document.getElementById('btn-timer-play');
            if (chronoInterval) {
                clearInterval(chronoInterval); chronoInterval = null; btn.innerText = "▶️";
            } else {
                chronoInterval = setInterval(() => {
                    chronoSecondes++;
                    const m = Math.floor(chronoSecondes / 60).toString().padStart(2, '0');
                    const s = (chronoSecondes % 60).toString().padStart(2, '0');
                    document.getElementById('timer-display').innerText = `${m}:${s}`;
                }, 1000);
                btn.innerText = "⏸️";
            }
        }

        function resetChrono() {
            if (chronoInterval) { clearInterval(chronoInterval); chronoInterval = null; }
            chronoSecondes = 0;
            document.getElementById('timer-display').innerText = "00:00";
            document.getElementById('btn-timer-play').innerText = "▶️";
        }

        function appliquerFormatText(commande) { document.execCommand(commande, false, null); }

        async function initEvaluationPage() {
            try {
                if (!idSessionEvaluation) { document.getElementById('titre-session-evaluation').innerText = "❌ Aucune session spécifiée"; return; }
                
                db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                const { data: s } = await db.from('sessions').select('nom, statut').eq('id', idSessionEvaluation).single();
                if (s) {
                    if (s.statut === 'terminee') {
                        document.body.innerHTML = `<div class="max-w-lg w-full bg-gray-900 p-8 rounded-2xl border border-gray-800 text-center shadow-2xl"><div class="text-4xl">🔒</div><h1 class="text-xl font-black text-white mt-4">Session Clôturée</h1><p class="text-gray-400 text-sm mt-2">Cette session n'accepte plus d'évaluations.</p></div>`;
                        return;
                    }
                    document.getElementById('titre-session-evaluation').innerText = `Session : ${s.nom}`;
                }

                const { data: g = [] } = await db.from('groupes').select('id, nom').eq('session_id', idSessionEvaluation);
                const { data: apps = [] } = await db.from('apprenants').select('prenom, groupe_id').eq('session_id', idSessionEvaluation);

                if (g && g.length > 0) {
                    const membresParIdGroupe = {};
                    g.forEach(grp => { membresParIdGroupe[grp.id] = []; });
                    if (apps) apps.forEach(student => { if (membresParIdGroupe[student.groupe_id]) membresParIdGroupe[student.groupe_id].push(student.prenom); });

                    // Construction dynamique des options pour nos menus custom
                    let optionsHtmlVotant = `<button type="button" onclick="selectOption('select-groupe-votant', '', '-- Choisissez votre équipe --')" class="w-full text-left block px-4 py-3 text-sm text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors cursor-pointer">-- Choisissez votre équipe --</button>`;
                    let optionsHtmlSujet = ``;

                    g.forEach(grp => {
                        const listeMembres = (membresParIdGroupe[grp.id] || []).map(formaterPrenomInitiale).join(', ');
                        const label = listeMembres ? `${grp.nom} (${listeMembres})` : grp.nom;
                        
                        const safeValue = grp.nom.replace(/'/g, "\\'");
                        const safeLabel = label.replace(/'/g, "\\'");
                        
                        const btnHtml = `<button type="button" onclick="selectOption('TYPE_TARGET', '${safeValue}', '${safeLabel}')" class="w-full text-left block px-4 py-3 text-sm text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors cursor-pointer">${label}</button>`;
                        
                        optionsHtmlVotant += btnHtml.replace('TYPE_TARGET', 'select-groupe-votant');
                        optionsHtmlSujet += btnHtml.replace('TYPE_TARGET', 'select-sujet-evalue');
                    });

                    document.getElementById('select-groupe-votant-menu').innerHTML = optionsHtmlVotant;
                    document.getElementById('select-sujet-evalue-menu').innerHTML = optionsHtmlSujet;
                    
                    // Initialisation du sujet par défaut (1er de la liste)
                    const firstGrp = g[0];
                    const firstGrpMembres = (membresParIdGroupe[firstGrp.id] || []).map(formaterPrenomInitiale).join(', ');
                    const firstLabel = firstGrpMembres ? `${firstGrp.nom} (${firstGrpMembres})` : firstGrp.nom;

                    document.getElementById('select-sujet-evalue').value = firstGrp.nom;
                    document.getElementById('select-sujet-evalue-label').innerText = firstLabel;
                    ciblePrecedente = firstGrp.nom;
                    votantPrecedent = "";
                }

                const { data: crits = [] } = await db.from('criteres').select('*').eq('session_id', idSessionEvaluation).order('id');
                if (crits && crits.length > 0) {
                    listeCriteres = crits;
                    genererCurseursCriteres();
                    
                    if (votantPrecedent) {
                        const cacheSauvegarde = localStorage.getItem(`cache_vote_${idSessionEvaluation}_${votantPrecedent}`);
                        if (cacheSauvegarde) {
                            memoireEvaluations = JSON.parse(cacheSauvegarde);
                            if (ciblePrecedente) restituerCurseursDepuisMemoire(ciblePrecedente);
                        }
                    }
                }
            } catch (errorGlobal) { await UIModal.alert("Erreur fatale : " + errorGlobal.message, "error", "Erreur Système"); }
        }

        function mettreAJourCouleurBadge(index, valeur) {
            const badge = document.getElementById(`badge-note-app-${index}`);
            if(!badge) return;
            valeur = parseFloat(valeur);
            badge.innerText = valeur;
            
            badge.className = "flex items-center justify-center w-12 h-12 rounded-xl font-black text-xl border shadow-lg transition-colors duration-300 ";
            if (valeur < 2.5) { badge.className += "bg-red-500/10 text-red-400 border-red-500/30"; } 
            else if (valeur <= 3.5) { badge.className += "bg-amber-500/10 text-amber-400 border-amber-500/30"; } 
            else { badge.className += "bg-emerald-500/10 text-emerald-400 border-emerald-500/30"; }
        }

        function genererCurseursCriteres() {
            document.getElementById('conteneur-criteres-evaluation').innerHTML = listeCriteres.map((c, index) => `
                <div class="bg-gray-950/40 p-5 rounded-xl border border-gray-800/60 shadow-inner space-y-4">
                    <div class="flex justify-between items-center gap-4">
                        <div>
                            <span class="text-gray-200 font-bold text-sm md:text-base leading-tight">🎯 ${c.nom}</span>
                            ${c.description ? `<p class="text-xs text-gray-500 mt-0.5 leading-relaxed font-normal">${c.description}</p>` : ''}
                        </div>
                        <div id="badge-note-app-${index}" class="flex shrink-0 items-center justify-center w-12 h-12 rounded-xl bg-amber-500/10 text-amber-400 font-black text-xl border border-amber-500/30 shadow-lg">3</div>
                    </div>
                    <div class="relative pt-2 pb-4">
                        <input type="range" id="eval-crit-${index}" min="1" max="5" step="0.5" value="3" 
                            oninput="mettreAJourCouleurBadge(${index}, this.value); enregistrerEtatCurseursEnContinu();" 
                            class="w-full h-3 bg-gray-800 rounded-full appearance-none cursor-pointer accent-blue-500 relative z-10 focus:outline-none">
                        <div class="flex justify-between px-1.5 text-[11px] text-gray-500 mt-2 font-mono font-bold select-none">
                            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 pt-2 border-t border-gray-800/50">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">❓ Questions à poser :</label>
                            <textarea id="questions-crit-${index}" oninput="enregistrerEtatCurseursEnContinu()" rows="4" placeholder="Ex: Pourquoi ce choix technique ?" class="w-full bg-gray-900 border border-gray-800 text-slate-200 placeholder:text-gray-700 rounded-lg p-2.5 text-sm font-sans focus:outline-none focus:border-blue-500 transition-all resize-y min-h-[100px]"></textarea>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">📔 Notes personnelles :</label>
                            <textarea id="journal-crit-${index}" oninput="enregistrerEtatCurseursEnContinu()" rows="4" placeholder="Ex: Bonne présentation..." class="w-full bg-gray-900 border border-gray-800 text-slate-200 placeholder:text-gray-700 rounded-lg p-2.5 text-sm font-sans focus:outline-none focus:border-blue-500 transition-all resize-y min-h-[100px]"></textarea>
                        </div>
                    </div>
                </div>
            `).join('');
            
            listeCriteres.forEach((_, i) => mettreAJourCouleurBadge(i, 3));
        }

        function sauvegarderCacheSpecifique(votant, cible) {
            if (!votant || !cible) return;
            if (!memoireEvaluations[cible]) memoireEvaluations[cible] = { criteres: {}, feedback: "" };
            
            listeCriteres.forEach((c, index) => {
                const inputNote = document.getElementById(`eval-crit-${index}`);
                const inputQ = document.getElementById(`questions-crit-${index}`);
                const inputJ = document.getElementById(`journal-crit-${index}`);
                
                memoireEvaluations[cible].criteres[index] = {
                    note: inputNote ? parseFloat(inputNote.value) : 3,
                    questions: inputQ ? inputQ.value : "",
                    journal: inputJ ? inputJ.value : ""
                };
            });

            const inputFB = document.getElementById('feedback-global');
            if (inputFB) memoireEvaluations[cible].feedback = inputFB.innerHTML;
            
            localStorage.setItem(`cache_vote_${idSessionEvaluation}_${votant}`, JSON.stringify(memoireEvaluations));
        }

        function enregistrerEtatCurseursEnContinu() {
            sauvegarderCacheSpecifique(document.getElementById('select-groupe-votant').value, document.getElementById('select-sujet-evalue').value);
        }

        function changerDeCibleEvaluation(nouvelleCible) {
            if (ciblePrecedente) sauvegarderCacheSpecifique(document.getElementById('select-groupe-votant').value, ciblePrecedente);
            restituerCurseursDepuisMemoire(nouvelleCible);
            ciblePrecedente = nouvelleCible;
        }

        function changerDeGroupeVotant(nouveauVotant) {
            if (votantPrecedent && ciblePrecedente) sauvegarderCacheSpecifique(votantPrecedent, ciblePrecedente);

            const cacheSauvegarde = localStorage.getItem(`cache_vote_${idSessionEvaluation}_${nouveauVotant}`);
            memoireEvaluations = cacheSauvegarde ? JSON.parse(cacheSauvegarde) : {};

            restituerCurseursDepuisMemoire(document.getElementById('select-sujet-evalue').value);
            votantPrecedent = nouveauVotant;
        }

        function restituerCurseursDepuisMemoire(cible) {
            const dataCible = memoireEvaluations[cible];

            listeCriteres.forEach((c, index) => {
                const blocDonnees = (dataCible && dataCible.criteres && dataCible.criteres[index]) ? dataCible.criteres[index] : null;
                const noteSauvegardee = blocDonnees ? (typeof blocDonnees === 'object' ? blocDonnees.note : blocDonnees) : 3;

                const input = document.getElementById(`eval-crit-${index}`);
                if (input) { input.value = noteSauvegardee; mettreAJourCouleurBadge(index, noteSauvegardee); }
                
                const inputQ = document.getElementById(`questions-crit-${index}`);
                if (inputQ) inputQ.value = (blocDonnees && typeof blocDonnees === 'object') ? blocDonnees.questions : "";
                
                const inputJ = document.getElementById(`journal-crit-${index}`);
                if (inputJ) inputJ.value = (blocDonnees && typeof blocDonnees === 'object') ? blocDonnees.journal : "";
            });

            const inputFB = document.getElementById('feedback-global');
            if (inputFB) inputFB.innerHTML = (dataCible && dataCible.feedback) ? dataCible.feedback : "";
        }

        async function soumettreEvaluationGenerale() {
            const groupeVotant = document.getElementById('select-groupe-votant').value;
            
            if (!groupeVotant) {
                await UIModal.alert("Veuillez sélectionner votre équipe dans le menu déroulant en haut de la page avant d'envoyer !", "warning", "Équipe manquante");
                return;
            }
            
            enregistrerEtatCurseursEnContinu();

            const { data: verifDejaFait } = await db.from('evaluations').select('id').eq('session_id', idSessionEvaluation).eq('groupe_votant', groupeVotant).limit(1);
            if (verifDejaFait && verifDejaFait.length > 0) { 
                await UIModal.alert(`Votre équipe a déjà validé et transmis ses évaluations.`, "warning", "Évaluations déjà reçues");
                return; 
            }

            const listeGroupesEvalues = Object.keys(memoireEvaluations);
            const paquetInsertions = [];
            let aFaitSonAutoEval = false;

            listeGroupesEvalues.forEach(nomSujet => {
                let totalNotes = 0;
                const tableauNotes = [];
                const dataCible = memoireEvaluations[nomSujet];

                listeCriteres.forEach((c, index) => { 
                    const bloc = (dataCible && dataCible.criteres && dataCible.criteres[index]) ? dataCible.criteres[index] : null;
                    let val = bloc ? (typeof bloc === 'object' ? bloc.note : bloc) : 3;
                    tableauNotes.push(val);
                    totalNotes += val;
                });

                if (nomSujet === groupeVotant) aFaitSonAutoEval = true;

                const moyenneSur20 = (totalNotes / listeCriteres.length / 5) * 20;

                let empreinteDecimale = "";
                tableauNotes.forEach(val => empreinteDecimale += Math.round(val * 10).toString().padStart(2, '0'));
                const noteCompletePayload = parseFloat(moyenneSur20.toFixed(4) + empreinteDecimale);

                paquetInsertions.push({
                    session_id: idSessionEvaluation,
                    groupe_votant: groupeVotant,
                    sujet: nomSujet,
                    note: noteCompletePayload,
                    feedback: dataCible.feedback || ""
                });
            });

            if (paquetInsertions.length === 0) { 
                await UIModal.alert("Aucune note saisie à transmettre. Le formulaire est vide.", "error", "Soumission annulée"); 
                return; 
            }

            const { error } = await db.from('evaluations').insert(paquetInsertions);

            if (!error) {
                localStorage.removeItem(`cache_vote_${idSessionEvaluation}_${groupeVotant}`);
                document.getElementById('rapport-nom-groupe').innerText = `Équipe : ${groupeVotant}`;
                document.getElementById('rapport-nb-groupes').innerText = listeGroupesEvalues.length;
                
                const baliseAutoEval = document.getElementById('rapport-auto-statut');
                baliseAutoEval.innerText = aFaitSonAutoEval ? "Validée et Incluse ✅" : "Manquante ❌";
                baliseAutoEval.className = aFaitSonAutoEval ? "font-bold text-emerald-400" : "font-bold text-red-400";

                document.getElementById('ecran-formulaire').classList.add('hidden');
                document.getElementById('ecran-rapport').classList.remove('hidden');
            } else { await UIModal.alert("Erreur de synchronisation : " + error.message, "error", "Erreur technique"); }
        }

        window.onload = initEvaluationPage;
    </script>
</body>
</html>
