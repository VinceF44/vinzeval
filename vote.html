<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace de Vote Évaluation (Échelle 1-5)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 flex items-center justify-center">

    <div class="max-w-md w-full bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl space-y-6">
        <div class="text-center">
            <h1 class="text-xl font-black text-indigo-400">🗳️ Évaluation Session Live</h1>
            <p class="text-xs text-slate-400 mt-1">Attribuez une note de 1 (Insuffisant) à 5 (Excellent) pour chaque critère.</p>
        </div>

        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Votre Équipe :</label>
                    <select id="mon-groupe" class="w-full bg-slate-900 rounded p-2 text-sm border border-slate-700 text-white focus:outline-none"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Équipe Évaluée :</label>
                    <select id="groupe-scene" class="w-full bg-slate-900 rounded p-2 text-sm border border-slate-700 text-white focus:outline-none"></select>
                </div>
            </div>

            <div id="conteneur-criteres-dynamiques" class="space-y-4 pt-2">
                <p class="text-xs text-slate-500 text-center py-2">Chargement des critères de la session...</p>
            </div>

            <button onclick="envoyerVote()" class="w-full bg-indigo-600 hover:bg-indigo-700 font-bold py-3 rounded-xl transition cursor-pointer text-sm uppercase mt-4">Soumettre mon évaluation</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let dbSupabase;

        const urlParams = new URLSearchParams(window.location.search);
        const idSessionEnCours = urlParams.get('session_id');
        let listeCriteresSession = [];

        async function initVote() {
            if (!idSessionEnCours) {
                alert("⚠️ Lien de vote invalide (id session manquant).");
                return;
            }
            dbSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // 1. Chargement des groupes
            const { data: groupes } = await dbSupabase.from('groupes').select('*').eq('session_id', idSessionEnCours);
            if (groupes) {
                const selectMonGroupe = document.getElementById('mon-groupe');
                const selectGroupeScene = document.getElementById('groupe-scene');
                selectMonGroupe.innerHTML = groupes.map(g => `<option value="${g.nom}">${g.nom}</option>`).join('');
                selectGroupeScene.innerHTML = groupes.map(g => `<option value="${g.nom}">${g.nom}</option>`).join('');
            }

            // 2. Chargement des critères et génération des sliders 1 à 5
            const { data: criteres } = await dbSupabase.from('criteres').select('*').eq('session_id', idSessionEnCours);
            const conteneur = document.getElementById('conteneur-criteres-dynamiques');
            
            if (criteres && criteres.length > 0) {
                listeCriteresSession = criteres;
                conteneur.innerHTML = criteres.map((c, index) => `
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-1">
                            <span class="text-slate-300">🎯 ${c.nom}</span>
                            <span id="val-c-${index}" class="text-indigo-400 bg-slate-900 px-2 py-0.5 rounded font-mono">3 / 5</span>
                        </div>
                        <input type="range" id="crit-${index}" min="1" max="5" step="0.5" value="3" 
                            oninput="document.getElementById('val-c-${index}').innerText = this.value + ' / 5'" 
                            class="w-full accent-indigo-500 h-1.5 bg-slate-900 rounded-lg appearance-none cursor-pointer">
                    </div>
                `).join('');
            } else {
                conteneur.innerHTML = `<p class="text-xs text-amber-400 text-center py-2">⚠️ Aucun critère configuré. Contactez le formateur.</p>`;
            }
        }

        async function envoyerVote() {
            const monGroupe = document.getElementById('mon-groupe').value;
            const groupeScene = document.getElementById('groupe-scene').value;
            
            if (monGroupe === groupeScene) {
                // On laisse passer l'auto-évaluation, mais le dashboard l'identifiera séparément
                alert("Note enregistrée en tant qu'auto-évaluation !");
            }

            // Calcul de la moyenne des critères (sur 5)
            let sommeNotesSur5 = 0;
            let nbCriteres = listeCriteresSession.length;

            if (nbCriteres > 0) {
                for (let i = 0; i < nbCriteres; i++) {
                    sommeNotesSur5 += parseFloat(document.getElementById(`crit-${i}`).value);
                }
            } else {
                return alert("Impossible de voter : aucun critère disponible.");
            }

            const moyenneSur5 = sommeNotesSur5 / nbCriteres;
            // Règle de trois : (Note / 5) * 20 pour stocker sur 20 dans la base de données
            const noteSur20 = (moyenneSur5 / 5) * 20;

            // Pour rester compatible avec la table Supabase, on sauvegarde la note sur 20 calculée
            const payload = {
                session_id: idSessionEnCours, 
                evaluateur: monGroupe,
                sujet: groupeScene,
                note_structure: noteSur20,
                note_analyse: noteSur20,
                note_posture: noteSur20
            };

            const { error } = await dbSupabase.from('evaluations').insert([payload]);
            if (error) {
                alert("Erreur : " + error.message);
            } else {
                alert("Votre évaluation (échelle 1-5) a été transmise avec succès ! 🎉");
            }
        }

        window.onload = initVote;
    </script>
</body>
</html>
