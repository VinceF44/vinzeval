<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Session — Évaluation Croisée</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-4 md:p-8 flex items-center justify-center">

    <div class="w-full max-w-lg bg-gray-900 p-6 rounded-2xl border border-gray-800 space-y-6 shadow-2xl">
        
        <div class="border-b border-gray-800 pb-4">
            <span class="bg-blue-950/50 text-blue-400 text-[10px] font-bold uppercase px-2 py-0.5 rounded border border-blue-800/50">🗳️ Espace Évaluation</span>
            <h1 id="titre-session-vote" class="text-xl font-black text-white mt-1">Chargement de la session...</h1>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Votre équipe (Votant) :</label>
                <select id="select-groupe-votant" class="w-full bg-gray-950 rounded p-2.5 text-sm border border-gray-800 text-white focus:outline-none"></select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Équipe à évaluer :</label>
                <select id="select-sujet-evalue" class="w-full bg-gray-950 rounded p-2.5 text-sm border border-gray-800 text-white focus:outline-none"></select>
            </div>

            <div id="conteneur-criteres-vote" class="space-y-4 pt-2 border-t border-gray-800/60">
                </div>

            <div class="pt-4">
                <button onclick="soumettreEvaluation()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition cursor-pointer shadow-lg shadow-blue-950/50 uppercase text-xs tracking-wider">
                    🚀 Envoyer mon évaluation
                </button>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        const urlParams = new URLSearchParams(window.location.search);
        const idSessionVote = urlParams.get('session_id');

        let listeCriteres = [];

        async function initVotePage() {
            if (!idSessionVote) {
                document.getElementById('titre-session-vote').innerText = "❌ Aucune session spécifiée";
                return;
            }
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 1. Récupération du nom de la session pour le titre
            const { data: s } = await db.from('sessions').select('nom').eq('id', idSessionVote).single();
            if (s) {
                document.getElementById('titre-session-vote').innerText = `Session : ${s.nom}`;
            }

            // 2. Récupération des groupes avec leurs membres
            // Remplacer 'membres' par le nom exact de votre colonne dans Supabase si nécessaire
            const { data: g } = await db.from('groupes').select('id, nom, membres').eq('session_id', idSessionVote);
            if (g) {
                // Construction des options textuelles : "Groupe X (Prénom1, Prénom2, ...)"
                const optionsHtml = g.map(grp => {
                    const prénoms = grp.membres ? ` (${grp.membres})` : '';
                    return `<option value="${grp.nom}">${grp.nom}${prénoms}</option>`;
                }).join('');

                document.getElementById('select-groupe-votant').innerHTML = optionsHtml;
                document.getElementById('select-sujet-evalue').innerHTML = optionsHtml;
            }

            // 3. Récupération des critères pour la notation de 1 à 5
            const { data: crits } = await db.from('criteres').select('*').eq('session_id', idSessionVote);
            if (crits && crits.length > 0) {
                listeCriteres = crits;
                document.getElementById('conteneur-criteres-vote').innerHTML = crits.map((c, index) => `
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">🎯 ${c.nom}</span>
                            <span id="v-v-${index}" class="text-blue-400 font-bold font-mono">3 / 5</span>
                        </div>
                        <input type="range" id="vote-crit-${index}" min="1" max="5" step="0.5" value="3" 
                            oninput="document.getElementById('v-v-${index}').innerText = this.value + ' / 5'" 
                            class="w-full accent-blue-500 h-1 bg-gray-950 rounded-lg appearance-none cursor-pointer">
                    </div>
                `).join('');
            }
        }

        async function soumettreEvaluation() {
            const votant = document.getElementById('select-groupe-votant').value;
            const sujet = document.getElementById('select-sujet-evalue').value;

            // Calcul de la note moyenne saisie sur 5
            let totalNotes = 0;
            for (let i = 0; i < listeCriteres.length; i++) {
                totalNotes += parseFloat(document.getElementById(`vote-crit-${i}`).value);
            }
            const moySur5 = totalNotes / listeCriteres.length;
            
            // Conversion automatique pour la base de données qui attend une note globale sur 20
            const noteFinaleSur20 = (moySur5 / 5) * 20;

            const { error } = await db.from('evaluations').insert([{
                session_id: idSessionVote,
                groupe_votant: votant,
                sujet: sujet,
                note: noteFinaleSur20
            }]);

            if (!error) {
                alert("🎉 Évaluation envoyée avec succès ! Merci.");
                // Optionnel : Réinitialiser les sliders à 3
                for (let i = 0; i < listeCriteres.length; i++) {
                    document.getElementById(`vote-crit-${i}`).value = 3;
                    document.getElementById(`v-v-${i}`).innerText = "3 / 5";
                }
            } else {
                alert("❌ Erreur lors de l'envoi : " + error.message);
            }
        }

        window.onload = initVotePage;
    </script>
</body>
</html>
