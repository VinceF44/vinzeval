<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Plateforme Multi-Jury</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4 select-none">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl space-y-6">
        
        <div class="text-center space-y-2">
            <span class="bg-indigo-950/50 text-indigo-400 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded border border-indigo-800/50">Console d'accès sécurisée</span>
            <h1 class="text-2xl font-black text-white tracking-tight mt-2">Authentification Collaborative</h1>
            <p class="text-xs text-gray-400">Saisissez vos identifiants pour accéder à votre espace de travail.</p>
        </div>

        <form id="form-login" onsubmit="executerConnexion(event)" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-400 uppercase">Adresse Email</label>
                <input type="email" id="login-email" required placeholder="nom@exemple.com" class="w-full bg-gray-950 rounded-xl p-3 text-sm border border-gray-800 text-white placeholder:text-gray-700 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-400 uppercase">Mot de passe</label>
                <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-gray-950 rounded-xl p-3 text-sm border border-gray-800 text-white placeholder:text-gray-700 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-800 disabled:text-gray-600 text-white text-sm font-bold py-3 rounded-xl transition cursor-pointer active:scale-98 shadow-lg font-sans tracking-wide">
                🔓 Se connecter
            </button>
        </form>

    </div>

    <div id="ui-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity opacity-0" style="transition: opacity 0.2s;">
        <div class="bg-gray-900 border border-gray-800 w-full max-w-sm rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform" id="ui-modal-box" style="transition: transform 0.2s;">
            <div class="p-5 flex items-start gap-4">
                <div class="text-3xl shrink-0 mt-1">❌</div>
                <div class="flex-1 pt-1">
                    <h3 class="text-base font-black text-red-500 mb-1.5 uppercase tracking-wide">Erreur</h3>
                    <p id="ui-modal-message" class="text-sm text-gray-400 leading-relaxed"></p>
                </div>
            </div>
            <div class="p-4 bg-gray-950/50 border-t border-gray-800 flex justify-end">
                <button onclick="fermerModal()" class="px-5 py-2 rounded-xl text-sm font-bold text-white bg-red-600 hover:bg-red-700 shadow-md transition-all active:scale-95 cursor-pointer">OK</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function afficherErreur(msg) {
            document.getElementById('ui-modal-message').innerText = msg;
            const modal = document.getElementById('ui-modal');
            const box = document.getElementById('ui-modal-box');
            modal.classList.remove('hidden'); void modal.offsetWidth;
            modal.classList.add('opacity-100'); box.classList.add('scale-100');
        }

        function fermerModal() {
            const modal = document.getElementById('ui-modal');
            modal.classList.add('hidden');
        }

        async function executerConnexion(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-submit');

            try {
                btn.innerText = "⏳ Vérification..."; btn.disabled = true;

                // 1. Connexion Auth Supabase
                const { data: authData, error: authError } = await db.auth.signInWithPassword({ email, password });
                if (authError) throw authError;

                // 2. Récupération du rôle dans la table profils
                const { data: profil, error: profError } = await db.from('profils').select('role').eq('id', authData.user.id).single();
                if (profError || !profil) {
                    // Si le profil n'existe pas encore (ex: ton compte admin d'origine), on le crée par défaut en super_admin
                    if (email === "vincent.fallick@gmail.com") {
                        await db.from('profils').insert([{ id: authData.user.id, email: email, role: 'super_admin' }]);
                        window.location.href = "admin.html";
                        return;
                    }
                    throw new Error("Aucun profil associé à ce compte utilisateur.");
                }

                // 3. Redirection intelligente selon le rôle
                // Les RP et Super_Admin vont sur la console globale admin.html
                if (profil.role === 'super_admin' || profil.role === 'rp') {
                    window.location.href = "admin.html";
                } else {
                    // Les formateurs simples vont directement sur l'index (Leur Dashboard)
                    window.location.href = "index.html";
                }

            } catch (err) {
                afficherErreur(err.message || "Identifiants incorrects.");
                btn.innerText = "🔓 Se connecter"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
