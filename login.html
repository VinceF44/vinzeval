<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité & Authentification — Spireo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 select-none">

    <div class="w-full max-w-md bg-[#101828] border border-slate-800 p-8 rounded-2xl shadow-2xl space-y-6 relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center space-y-4 relative z-10">
            <div class="flex items-center justify-center gap-2.5 select-none mb-2">
                <svg class="w-10 h-10 drop-shadow-md" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 4C9.37258 4 4 9.37258 4 16C4 22.6274 9.37258 28 16 28C22.6274 28 28 22.6274 28 16C28 11.5817 24.4183 8 20 8" stroke="url(#grad-spireo-login)" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M20 8C16.6863 8 13 10.6863 13 14C13 17.3137 16.6863 20 20 20C22.2091 20 24.1273 18.7456 25.1613 16.938" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="20" cy="14" r="3" fill="#fe9a00"/>
                    <defs>
                        <linearGradient id="grad-spireo-login" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#818cf8"/>
                            <stop offset="1" stop-color="#3b82f6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="text-3xl font-black text-white tracking-tighter">Spireo<span class="text-indigo-500">.</span></span>
            </div>
            
            <div>
                <span class="inline-flex items-center gap-1.5 bg-indigo-950/60 text-indigo-400 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border border-indigo-800/30">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
                    Console d'accès sécurisée
                </span>
                <h1 id="auth-title" class="text-xl font-bold text-white tracking-tight mt-2">Authentification Collaborative</h1>
                <p id="auth-subtitle" class="text-xs text-slate-400 max-w-xs mx-auto mt-1">Saisissez vos identifiants pour accéder à votre espace de travail.</p>
            </div>
        </div>

        <form id="form-auth" onsubmit="gererSoumission(event)" class="space-y-4 relative z-10">
            
            <div id="container-identite" class="grid grid-cols-2 gap-4 hidden opacity-0 transition-opacity duration-300">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Prénom</label>
                    <input type="text" id="auth-prenom" placeholder="Jean" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-white placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Nom</label>
                    <input type="text" id="auth-nom" placeholder="Dupont" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-white placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Adresse Email</label>
                <input type="email" id="auth-email" required placeholder="nom@exemple.com" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-white placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div id="container-password" class="space-y-1.5 transition-all duration-300">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Mot de passe</label>
                    <button type="button" id="link-forgot" onclick="basculerMode('recuperation')" class="text-[11px] text-slate-500 hover:text-indigo-400 transition-colors cursor-pointer font-medium focus:outline-none">
                        Mot de passe oublié ?
                    </button>
                </div>
                <input type="password" id="auth-password" required placeholder="••••••••" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-white placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div id="container-role" class="space-y-1.5 hidden opacity-0 transition-opacity duration-300">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Rôle demandé</label>
                <div class="relative">
                    <button type="button" id="dropdown-btn" onclick="toggleDropdown()" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-white text-left flex justify-between items-center focus:outline-none focus:border-indigo-500 transition-all cursor-pointer">
                        <span id="dropdown-label">Sélectionner un rôle...</span>
                        <span class="text-slate-500 text-xs transition-transform duration-200" id="dropdown-arrow">▼</span>
                    </button>
                    <div id="dropdown-menu" class="hidden absolute left-0 right-0 mt-2 bg-[#030712] border border-slate-800 rounded-xl shadow-2xl z-50 overflow-hidden backdrop-blur-md">
                        <div onclick="selectionnerRole('formateur', '👨‍🏫 Formateur / Évaluateur')" class="p-3 text-sm text-slate-300 hover:bg-indigo-600 hover:text-white transition-colors cursor-pointer flex items-center justify-between">
                            <span>👨‍🏫 Formateur / Évaluateur</span>
                        </div>
                        <div onclick="selectionnerRole('rp', '💼 Responsable Pédagogique')" class="p-3 text-sm text-slate-300 hover:bg-indigo-600 hover:text-white transition-colors cursor-pointer flex items-center justify-between">
                            <span>💼 Responsable Pédagogique</span>
                        </div>
                    </div>
                </div>
                <input type="hidden" id="auth-role" value="">
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-600 text-white text-sm font-bold py-3 rounded-xl transition cursor-pointer active:scale-98 shadow-lg font-sans tracking-wide mt-2">
                🔐 Se connecter
            </button>
        </form>

        <div class="border-t border-slate-800/60 pt-4 text-center">
            <button type="button" id="btn-toggle-mode" onclick="declencherToggleBas()" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors cursor-pointer font-medium">
                Pas encore de compte ? Créer un profil d'accès
            </button>
        </div>

    </div>

    <div id="ui-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm transition-opacity opacity-0 duration-200">
        <div class="bg-[#101828] border border-slate-800 w-full max-w-sm rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-200" id="ui-modal-box">
            <div class="p-6 flex items-start gap-4">
                <div id="modal-icon" class="text-3xl shrink-0 mt-0.5">❌</div>
                <div class="flex-1">
                    <h3 id="modal-title" class="text-base font-black text-red-500 mb-1 uppercase tracking-wide">Erreur</h3>
                    <p id="ui-modal-message" class="text-sm text-slate-400 leading-relaxed"></p>
                </div>
            </div>
            <div class="p-4 bg-[#030712]/50 border-t border-slate-800 flex justify-end">
                <button onclick="fermerModal()" class="px-5 py-2 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 shadow-md transition-all active:scale-95 cursor-pointer">Compris</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let modeActuel = "connexion"; // États : "connexion" | "inscription" | "recuperation"

        function afficherModal(message, estErreur = true, titreAlternatif = "") {
            const modal = document.getElementById('ui-modal');
            const box = document.getElementById('ui-modal-box');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            
            document.getElementById('ui-modal-message').innerText = message;
            
            if (estErreur) {
                icon.innerText = "❌";
                title.innerText = titreAlternatif || "Erreur d'accès";
                title.className = "text-base font-black text-red-500 mb-1 uppercase tracking-wide";
            } else {
                icon.innerText = "✅";
                title.innerText = titreAlternatif || "Demande Enregistrée";
                title.className = "text-base font-black text-emerald-500 mb-1 uppercase tracking-wide";
            }

            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.add('opacity-100');
            box.classList.add('scale-100');
        }

        function fermerModal() {
            const modal = document.getElementById('ui-modal');
            const box = document.getElementById('ui-modal-box');
            modal.classList.remove('opacity-100');
            box.classList.remove('scale-100');
            setTimeout(() => { modal.classList.add('hidden'); }, 200);
        }

        function basculerMode(cible) {
            modeActuel = cible;
            
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btnSubmit = document.getElementById('btn-submit');
            const btnToggle = document.getElementById('btn-toggle-mode');
            
            const containerRole = document.getElementById('container-role');
            const containerIdentite = document.getElementById('container-identite');
            const containerPassword = document.getElementById('container-password');
            
            const inputPrenom = document.getElementById('auth-prenom');
            const inputNom = document.getElementById('auth-nom');
            const inputPassword = document.getElementById('auth-password');

            fermerDropdown();

            if (modeActuel === "inscription") {
                title.innerText = "Créer un espace";
                subtitle.innerText = "Enregistrez vos coordonnées pour solliciter un accès à la plateforme.";
                btnSubmit.innerText = "🔐 Créer mon compte";
                btnToggle.innerText = "Déjà inscrit ? Retourner à la connexion";
                
                inputPrenom.required = true;
                inputNom.required = true;
                inputPassword.required = true;

                containerPassword.classList.remove('hidden');
                containerIdentite.classList.remove('hidden');
                containerRole.classList.remove('hidden');
                void containerRole.offsetWidth;
                containerIdentite.classList.add('opacity-100');
                containerRole.classList.add('opacity-100');

            } else if (modeActuel === "recuperation") {
                title.innerText = "Récupération de compte";
                subtitle.innerText = "Saisissez votre adresse email pour recevoir un lien de réinitialisation sécurisé.";
                btnSubmit.innerText = "✉️ Envoyer le lien de récupération";
                btnToggle.innerText = "Retourner à la page de connexion";
                
                inputPrenom.required = false;
                inputNom.required = false;
                inputPassword.required = false;

                containerPassword.classList.add('hidden');
                containerIdentite.classList.add('hidden');
                containerRole.classList.add('hidden');
                containerIdentite.classList.remove('opacity-100');
                containerRole.classList.remove('opacity-100');

            } else { // Mode Connexion
                title.innerText = "Authentification Collaborative";
                subtitle.innerText = "Saisissez vos identifiants pour accéder à votre espace de travail.";
                btnSubmit.innerText = "🔐 Se connecter";
                btnToggle.innerText = "Pas encore de compte ? Créer un profil d'accès";
                
                inputPrenom.required = false;
                inputNom.required = false;
                inputPassword.required = true;

                containerPassword.classList.remove('hidden');
                containerIdentite.classList.add('hidden');
                containerRole.classList.add('hidden');
                containerIdentite.classList.remove('opacity-100');
                containerRole.classList.remove('opacity-100');
            }
        }

        function declencherToggleBas() {
            if (modeActuel === "connexion") basculerMode("inscription");
            else basculerMode("connexion");
        }

        function toggleDropdown() {
            const menu = document.getElementById('dropdown-menu');
            const arrow = document.getElementById('dropdown-arrow');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                fermerDropdown();
            }
        }

        function fermerDropdown() {
            document.getElementById('dropdown-menu').classList.add('hidden');
            document.getElementById('dropdown-arrow').style.transform = 'rotate(0deg)';
        }

        function selectionnerRole(valeur, label) {
            document.getElementById('auth-role').value = valeur;
            document.getElementById('dropdown-label').innerText = label;
            document.getElementById('dropdown-btn').classList.remove('border-slate-800');
            document.getElementById('dropdown-btn').classList.add('border-indigo-500');
            fermerDropdown();
        }

        document.addEventListener('click', function(e) {
            const btn = document.getElementById('dropdown-btn');
            const menu = document.getElementById('dropdown-menu');
            if (btn && !btn.contains(e.target) && menu && !menu.contains(e.target)) {
                fermerDropdown();
            }
        });

        async function gererSoumission(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('btn-submit');

            if (modeActuel === "connexion") {
                await traiterConnexion(email, password, btn);
            } else if (modeActuel === "inscription") {
                await traiterInscription(email, password, btn);
            } else {
                await traiterRecuperation(email, btn);
            }
        }

        async function traiterConnexion(email, password, btn) {
            try {
                btn.innerText = "⏳ Vérification sécurisée...";
                btn.disabled = true;

                const { data: authData, error: authError } = await db.auth.signInWithPassword({ email, password });
                if (authError) throw authError;

                const { data: profil, error: profError } = await db.from('profils').select('role, statut').eq('id', authData.user.id).single();
                
                if (profError || !profil) {
                    if (email === "vincent.fallick@gmail.com") {
                        await db.from('profils').insert([{ id: authData.user.id, email: email, role: 'super_admin', statut: 'valide' }]);
                        window.location.href = "admin.html";
                        return;
                    }
                    throw new Error("Aucun profil applicatif n'est configuré pour ce compte.");
                }

                if (profil.statut === 'en_attente') {
                    await db.auth.signOut(); 
                    throw new Error("Votre compte a bien été créé, mais il est actuellement en attente de validation par un Administrateur.");
                }

                if (profil.role === 'super_admin' || profil.role === 'rp' || profil.role === 'formateur') {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "index.html";
                }

            } catch (err) {
                afficherErreurModale(err.message || "Identifiants invalides.");
                btn.innerHTML = "🔐 Se connecter";
                btn.disabled = false;
            }
        }

        async function traiterInscription(email, password, btn) {
            const roleDemande = document.getElementById('auth-role').value;
            const prenom = document.getElementById('auth-prenom').value.trim();
            const nom = document.getElementById('auth-nom').value.trim();
            
            if (!roleDemande) {
                afficherModal("Veuillez sélectionner un rôle fonctionnel via le menu déroulant.");
                return;
            }

            try {
                btn.innerText = "⏳ Cryptage et création...";
                btn.disabled = true;

                const { data: authData, error: authError } = await db.auth.signUp({ email, password });
                
                if (authError) {
                    if (authError.message.includes("already registered") || authError.status === 422) {
                        throw new Error("Cette adresse email est déjà associée à un compte existant. Veuillez vous connecter.");
                    }
                    throw authError;
                }

                if (authData && authData.user) {
                    const { error: profError } = await db.from('profils').insert([
                        { 
                            id: authData.user.id, 
                            email: email, 
                            role: roleDemande, 
                            statut: 'en_attente',
                            prenom: prenom,
                            nom: nom
                        }
                    ]);

                    if (profError) throw profError;

                    afficherModal("Inscription réussie ! Un Administrateur va valider votre accès. Vous serez notifié lorsque votre compte sera actif.", false, "Succès");
                    
                    document.getElementById('form-auth').reset();
                    document.getElementById('dropdown-label').innerText = "Sélectionner un rôle...";
                    document.getElementById('auth-role').value = "";
                    basculerMode('connexion');
                }

            } catch (err) {
                afficherModal(err.message || "Erreur lors de la tentative d'inscription.");
            } finally {
                btn.innerHTML = "🔐 Créer mon compte";
                btn.disabled = false;
            }
        }

        async function traiterRecuperation(email, btn) {
            try {
                btn.innerText = "⏳ Envoi de la demande...";
                btn.disabled = true;

                const { error } = await db.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/login.html', 
                });

                if (error) throw error;

                afficherModal("Un lien sécurisé de réinitialisation vient de vous être envoyé par email. Veuillez vérifier votre boîte de réception.", false, "E-mail envoyé");
                basculerMode('connexion');
                document.getElementById('form-auth').reset();

            } catch (err) {
                afficherModal(err.message || "Impossible d'envoyer le lien de récupération.");
            } finally {
                btn.innerHTML = "✉️ Envoyer le lien de récupération";
                btn.disabled = false;
            }
        }

        function afficherErreurModale(msg) {
            let messageAjuste = msg;
            if (msg.includes("Invalid login credentials")) {
                messageAjuste = "Adresse email ou mot de passe incorrect.";
            }
            afficherModal(messageAjuste, true, "Échec d'Authentification");
        }
    </script>
</body>
</html>
