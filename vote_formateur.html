        // --- LOGIQUE UI DROPDOWNS CUSTOM ---
        function toggleDropdown(id) {
            const menu = document.getElementById(id + '-menu');
            const arrow = document.getElementById(id + '-arrow');
            
            document.querySelectorAll('.custom-dropdown-menu').forEach(m => {
                if (m.id !== id + '-menu') m.classList.add('hidden');
            });
            document.querySelectorAll('.dropdown-arrow').forEach(a => {
                if (a.id !== id + '-arrow') a.style.transform = 'rotate(0deg)';
            });

            const isHidden = menu.classList.toggle('hidden');
            arrow.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function selectOption(dropdownId, value, label) {
            const hiddenInput = document.getElementById(dropdownId);
            const labelSpan = document.getElementById(dropdownId + '-label');
            
            const valeurChangee = hiddenInput.value !== value;
            
            hiddenInput.value = value;
            labelSpan.innerText = label;
            
            toggleDropdown(dropdownId);
            
            if (valeurChangee) {
                if (dropdownId === 'select-evaluateur') changerDeFormateurVotant(value);
                else if (dropdownId === 'select-sujet-evalue') changerDeCibleFormateur(value);

        window.addEventListener('click', function(e) {

                document.querySelectorAll('.dropdown-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
            }
        });
        // -----------------------------------

        const UIModal = {
            show: function(options) {
                return new Promise((resolve) => {
                    const modal = document.getElementById('ui-modal');
                    const box = document.getElementById('ui-modal-box');
                    const title = document.getElementById('ui-modal-title');
                    const msg = document.getElementById('ui-modal-message');
                    const icon = document.getElementById('ui-modal-icon');
                    const input = document.getElementById('ui-modal-input');
                    const btnCancel = document.getElementById('ui-btn-cancel');
                    const btnConfirm = document.getElementById('ui-btn-confirm');

                    title.innerText = options.title || 'Information';
                    msg.innerHTML = options.message || '';
                    
                    if(options.type === 'error') { icon.innerText = '❌'; title.className = "text-base font-black text-red-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-white bg-red-600 hover:bg-red-700 shadow-md transition-all active:scale-95 cursor-pointer"; }
                    else if(options.type === 'success') { icon.innerText = '✅'; title.className = "text-base font-black text-emerald-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-md transition-all active:scale-95 cursor-pointer"; }
                    else if(options.type === 'warning') { icon.innerText = '⚠️'; title.className = "text-base font-black text-amber-500 mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-gray-900 bg-amber-500 hover:bg-amber-600 shadow-md transition-all active:scale-95 cursor-pointer"; }
                    else { icon.innerText = 'ℹ️'; title.className = "text-base font-black text-[#a855f7] mb-1.5 uppercase tracking-wide"; btnConfirm.className = "px-5 py-2 rounded-xl text-sm font-bold text-white bg-[#a855f7] hover:bg-[#9333ea] shadow-md transition-all active:scale-95 cursor-pointer"; }

                    if (options.isPrompt) {
                        input.classList.remove('hidden'); input.value = options.defaultValue || ''; setTimeout(() => input.focus(), 100);
                    } else { input.classList.add('hidden'); }

                    if (options.isConfirm || options.isPrompt) btnCancel.classList.remove('hidden'); else btnCancel.classList.add('hidden');
                    btnConfirm.innerText = options.confirmText || 'OK';

                    const cleanup = () => {
                        modal.classList.remove('opacity-100'); box.classList.remove('scale-100');
                        setTimeout(() => modal.classList.add('hidden'), 200);
                        btnConfirm.onclick = null; btnCancel.onclick = null;
                    };

                    btnConfirm.onclick = () => { cleanup(); if (options.isPrompt) resolve(input.value); else resolve(true); };
                    btnCancel.onclick = () => { cleanup(); if (options.isPrompt) resolve(null); else resolve(false); };

                    modal.classList.remove('hidden'); void modal.offsetWidth;
                    modal.classList.add('opacity-100'); box.classList.add('scale-100');
                });
            },
            alert: function(message, type = 'info', title) { return this.show({ message, type, title: title || (type === 'error' ? 'Erreur' : type==='success' ? 'Succès' : type==='warning' ? 'Attention' : 'Information'), isConfirm: false }); },
            confirm: function(message, title = 'Confirmation', type = 'warning') { return this.show({ message, type, title, isConfirm: true, confirmText: 'Confirmer' }); },
            prompt: function(message, defaultValue = '', title = 'Saisie requise') { return this.show({ message, type: 'info', title, isPrompt: true, defaultValue, confirmText: 'Valider' }); }
        };

        let chronoInterval = null;
        let chronoSecondes = 0;

        function toggleChrono() {
            const btn = document.getElementById('btn-timer-play');
            if (chronoInterval) {
                clearInterval(chronoInterval); chronoInterval = null; btn.innerText = "▶️";
            } else {
                chronoInterval = setInterval(() => {
                    chronoSecondes++;
                    const m = Math.floor(chronoSecondes / 60).toString().padStart(2, '0');
                    const s = (chronoSecondes % 60).toString().padStart(2, '0');
                    document.getElementById('timer-display').innerText = `${m}:${s}`;
                }, 1000);
                btn.innerText = "⏸️";
            }
        }

        function resetChrono() {
            if (chronoInterval) { clearInterval(chronoInterval); chronoInterval = null; }
            chronoSecondes = 0;
            document.getElementById('timer-display').innerText = "00:00";
            document.getElementById('btn-timer-play').innerText = "▶️";
        }

        function appliquerFormatTextProf(commande) { document.execCommand(commande, false, null); }

            const { data: s } = await db.from('sessions').select('nom').eq('id', idSessionDashboard).single();
            if(s) document.getElementById('nom-session').innerText = s.nom;

            const { data: evals } = await db.from('evaluateurs').select('nom').eq('session_id', idSessionDashboard).order('nom');
            
            // Construit dynamiquement les options personnalisées pour les Évaluateurs
            const selectEvalMenu = document.getElementById('select-evaluateur-menu');
            let evalOptions = `<button type="button" onclick="selectOption('select-evaluateur', '', '-- Choisissez votre nom --')" class="w-full text-left block px-4 py-3 text-sm text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">-- Choisissez votre nom --</button>`;
            
            if(evals && evals.length > 0) {
                evals.forEach(e => { 
                    const safeNom = e.nom.replace(/'/g, "\\'");
                    evalOptions += `<button type="button" onclick="selectOption('select-evaluateur', '${safeNom}', '${safeNom}')" class="w-full text-left block px-4 py-3 text-sm text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">${e.nom}</button>`;
                });
            } else {
                evalOptions += `<button type="button" onclick="selectOption('select-evaluateur', 'Formateur Principal', 'Formateur Principal')" class="w-full text-left block px-4 py-3 text-sm text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">Formateur Principal</button>`;
            }
            selectEvalMenu.innerHTML = evalOptions;
            evaluateurPrecedent = ""; 

            const { data: g } = await db.from('groupes').select('*').eq('session_id', idSessionDashboard).order('nom');
            if(g && g.length > 0) {
                groupesSession = g;
                let sujetOptions = '';
                g.forEach(grp => {
                    const safeNom = grp.nom.replace(/'/g, "\\'");
                    sujetOptions += `<button type="button" onclick="selectOption('select-sujet-evalue', '${safeNom}', '${safeNom}')" class="w-full text-left block px-4 py-3 text-sm text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">${grp.nom}</button>`;
                });
                document.getElementById('select-sujet-evalue-menu').innerHTML = sujetOptions;
                
                // Set default
                document.getElementById('select-sujet-evalue').value = g[0].nom;
                document.getElementById('select-sujet-evalue-label').innerText = g[0].nom;
                ciblePrecedente = g[0].nom;
            }

            const { data: critsProf } = await db.from('criteres').select('*').eq('session_id', idSessionDashboard).order('id');
            if(critsProf && critsProf.length > 0) {

            }

            await chargerNotesExistantes();

        function mettreAJourCouleurBadgeProf(index, valeur) {
            const badge = document.getElementById(`badge-note-prof-${index}`);
            if(!badge) return;
            valeur = parseFloat(valeur);
            badge.innerText = valeur;
            
            badge.className = "flex items-center justify-center w-12 h-12 rounded-xl font-black text-xl border shadow-lg transition-colors duration-300 ";
            if (valeur < 2.5) { badge.className += "bg-red-500/10 text-red-400 border-red-500/30"; } 
            else if (valeur <= 3.5) { badge.className += "bg-amber-500/10 text-amber-400 border-amber-500/30"; } 
            else { badge.className += "bg-emerald-500/10 text-emerald-400 border-emerald-500/30"; }
        }

            document.getElementById('conteneur-formateur-criteres').innerHTML = listeCriteresProf.map((c, index) => `

                    </div>
                    <div class="relative pt-2 pb-4">

        function decoderNoteEtCurseurs(notePleine) {
            if (!notePleine) return { noteGlobale: 0, sliders: [] };
            const chaineNote = Number(notePleine).toFixed(14);
            const parties = chaineNote.split('.');
            if (parties.length < 2) return { noteGlobale: notePleine, sliders: [] };
            
            const noteGlobaleInitiale = parseFloat(parties[0] + '.' + parties[1].substring(0, 4));
            let chaineDecimaleEmpreinte = parties[1].substring(4);
            let curseursRestitues = [];
            
            for (let i = 0; i < chaineDecimaleEmpreinte.length; i += 2) {
                let bloc = chaineDecimaleEmpreinte.substring(i, i + 2);
                if (bloc.length === 2) {
                    if (bloc === "00") break;
                    curseursRestitues.push(parseInt(bloc, 10) / 10);
                }
            }
            return { noteGlobale: noteGlobaleInitiale, sliders: curseursRestitues };
        }

        async function chargerNotesExistantes() {
            const evaluateurActuel = document.getElementById('select-evaluateur').value;
            if (!evaluateurActuel) return;

            const { data } = await db.from('evaluations').select('*').eq('session_id', idSessionDashboard).eq('groupe_votant', evaluateurActuel);
            notesFormateurLocales = {}; 
            
            if (data) {
                data.forEach(e => {
                    const extraction = decoderNoteEtCurseurs(e.note);
                    if (extraction.sliders.length === listeCriteresProf.length) {
                        notesFormateurLocales[e.sujet] = { sliders: extraction.sliders, questions: Array(listeCriteresProf.length).fill(""), journal: Array(listeCriteresProf.length).fill(""), feedback: "" };
                    }
                });
            }

            const cacheSauvegarde = localStorage.getItem(`cache_formateur_${idSessionDashboard}_${evaluateurActuel}`);
            if (cacheSauvegarde) Object.assign(notesFormateurLocales, JSON.parse(cacheSauvegarde));

            restituerSlidersPourCible(ciblePrecedente);
        }

        function synchroniserNotesLocales(groupeForce, evaluateurForce) {
            const evaluateurCible = evaluateurForce || document.getElementById('select-evaluateur').value;
            const groupeCible = groupeForce || document.getElementById('select-sujet-evalue').value;
            if (!groupeCible || !evaluateurCible) return;
            
            const tNotes = [], tQuestions = [], tJournal = [];

            for(let i=0; i < listeCriteresProf.length; i++) {
                const input = document.getElementById(`prof-crit-${i}`);
                const inputQ = document.getElementById(`prof-questions-${i}`);
                const inputJ = document.getElementById(`prof-journal-${i}`);

                tNotes.push(input ? parseFloat(input.value) : 3);
                tQuestions.push(inputQ ? inputQ.value : "");
                tJournal.push(inputJ ? inputJ.value : "");
            }

            const inputFB = document.getElementById('feedback-global-prof');
            notesFormateurLocales[groupeCible] = { sliders: tNotes, questions: tQuestions, journal: tJournal, feedback: inputFB ? inputFB.innerHTML : "" };

            localStorage.setItem(`cache_formateur_${idSessionDashboard}_${evaluateurCible}`, JSON.stringify(notesFormateurLocales));
        }

        function changerDeCibleFormateur(nouvelleCible) {
            const evaluateurActuel = document.getElementById('select-evaluateur').value;
            if (ciblePrecedente && evaluateurActuel) synchroniserNotesLocales(ciblePrecedente, evaluateurActuel);
            restituerSlidersPourCible(nouvelleCible);
            ciblePrecedente = nouvelleCible;
        }

        function changerDeFormateurVotant(nouveauEvaluateur) {
            const cibleActuelle = document.getElementById('select-sujet-evalue').value;
            if (evaluateurPrecedent && cibleActuelle) synchroniserNotesLocales(cibleActuelle, evaluateurPrecedent);
            evaluateurPrecedent = nouveauEvaluateur;
            chargerNotesExistantes();
        }

        function restituerSlidersPourCible(cible) {
            const blocExistante = notesFormateurLocales[cible];
            const isOldFormat = Array.isArray(blocExistante);

            for (let i = 0; i < listeCriteresProf.length; i++) {
                let val = 3, question = "", journal = "";

                if (blocExistante) {
                    val = isOldFormat ? blocExistante[i] : (blocExistante.sliders ? blocExistante.sliders[i] : 3);
                    question = (!isOldFormat && blocExistante.questions) ? blocExistante.questions[i] : "";
                    journal = (!isOldFormat && blocExistante.journal) ? blocExistante.journal[i] : "";
                }

                const input = document.getElementById(`prof-crit-${i}`);
                if (input) { input.value = val; mettreAJourCouleurBadgeProf(i, val); }
                const inputQ = document.getElementById(`prof-questions-${i}`);
                if (inputQ) inputQ.value = question;
                const inputJ = document.getElementById(`prof-journal-${i}`);
                if (inputJ) inputJ.value = journal;
            }

            const inputFB = document.getElementById('feedback-global-prof');
            if (inputFB) inputFB.innerHTML = (blocExistante && !isOldFormat && blocExistante.feedback) ? blocExistante.feedback : "";
        }

        async function enregistrerToutesLesNotesFormateur() {
            const evaluateurActuel = document.getElementById('select-evaluateur').value;
            if (!evaluateurActuel) { await UIModal.alert("Veuillez sélectionner votre nom d'évaluateur avant de valider.", "warning", "Évaluateur manquant"); return; }

            const groupeActuel = document.getElementById('select-sujet-evalue').value;
            if (groupeActuel) synchroniserNotesLocales(groupeActuel, evaluateurActuel);

            const listeSujetsEvalues = Object.keys(notesFormateurLocales);
            if (listeSujetsEvalues.length === 0) { await UIModal.alert("Aucune note n'a été saisie pour le moment.", "warning", "Formulaire vide"); return; }

            const paquetInsertions = [];

            listeSujetsEvalues.forEach(nomSujet => {
                const dataTarget = notesFormateurLocales[nomSujet];
                const tableauNotes = dataTarget.sliders || (Array.isArray(dataTarget) ? dataTarget : null);

                if (tableauNotes && tableauNotes.length > 0) {
                    const moyenneSur20 = (tableauNotes.reduce((a, b) => a + b, 0) / tableauNotes.length / 5) * 20;
                    let empreinteDecimale = "";
                    tableauNotes.forEach(val => empreinteDecimale += Math.round(val * 10).toString().padStart(2, '0'));

                    const noteCompletePayload = parseFloat(moyenneSur20.toFixed(4) + empreinteDecimale);

                    paquetInsertions.push({
                        session_id: idSessionDashboard,
                        groupe_votant: evaluateurActuel,
                        sujet: nomSujet,
                        note: noteCompletePayload,
                        feedback: dataTarget.feedback || ""
                    });
                }
            });

            if (paquetInsertions.length === 0) { await UIModal.alert("Aucune note valide trouvée.", "error"); return; }

            const { error: deleteError } = await db.from('evaluations')
                .delete()
                .eq('session_id', idSessionDashboard)
                .eq('groupe_votant', evaluateurActuel);

            if (deleteError) { await UIModal.alert("Erreur lors du nettoyage de la base de données : " + deleteError.message, "error"); return; }

            const { error: insertError } = await db.from('evaluations').insert(paquetInsertions);

            if (insertError) { await UIModal.alert("Erreur lors de l'enregistrement : " + insertError.message, "error");
            } else { await UIModal.alert(`Toutes vos grilles d'évaluations (${paquetInsertions.length}) ont été sauvegardées pour la session par ${evaluateurActuel}.`, "success", "Sauvegarde réussie 🎉"); }
        }

        window.onload = initFormulaire;
    </script>
</body>
</html>
