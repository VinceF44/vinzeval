<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évaluation Formateur — Espace Zen Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-slate-200 font-sans min-h-screen p-3 sm:p-6 md:p-8 flex items-center justify-center selection:bg-[#a855f7]/30">

    <div class="w-full max-w-5xl bg-[#101828] p-4 sm:p-6 rounded-2xl border border-slate-800 space-y-6 shadow-2xl transition-all" id="formulaire-container">
        
        <div class="border-b border-slate-800 pb-4">
            <span class="bg-[#030712]/50 text-[#a855f7] text-[10px] font-bold uppercase px-2 py-0.5 rounded border border-[#a855f7]/30">
                👩‍🏫 Espace Évaluation Formateur
            </span>
            <h1 id="nom-session" class="text-xl font-black text-white mt-1">Chargement de la session...</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Votre profil Formateur / Évaluateur :</label>
                <select id="select-evaluateur" onchange="changerDeFormateurVotant(this.value)" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-slate-100 focus:outline-none focus:border-[#a855f7] transition-all cursor-pointer">
                    <option value="" disabled selected>-- Choisissez votre nom --</option>
                </select>
            </div>
            <div class="bg-[#030712]/40 p-3 rounded-xl border border-slate-800/60">
                <label class="block text-xs font-bold uppercase text-purple-400 mb-1">Groupe à évaluer :</label>
                <select id="select-sujet-evalue" onchange="changerDeCibleFormateur(this.value)" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-purple-900/40 text-slate-100 focus:outline-none focus:border-[#a855f7] transition-all cursor-pointer"></select>
            </div>
        </div>
        
        <p class="text-[11px] text-slate-500 bg-[#030712]/50 p-2 rounded-lg border border-slate-800/40">💡 Notez les équipes à tour de rôle en changeant de cible. Vos curseurs et blocs-notes sont sauvegardés au fur et à mesure. Cliquez sur le gros bouton en bas à la fin pour tout valider d'un coup.</p>

        <div id="conteneur-formateur-criteres" class="space-y-5 pt-2 border-t border-slate-800/60">
            </div>

        <div class="pt-4 border-t border-slate-800/60 space-y-1.5">
            <label class="block text-xs font-bold uppercase text-slate-400">📝 Feedback Global & Recommandations Jury :</label>
            <div class="flex flex-col rounded-xl overflow-hidden border border-slate-800 focus-within:border-[#a855f7] transition-all">
                <div class="flex items-center gap-1 bg-[#030712] p-2 border-b border-slate-800 select-none">
                    <button type="button" onclick="appliquerFormatTextProf('bold')" class="h-7 w-8 font-black text-xs rounded hover:bg-slate-800 text-slate-300 transition-all cursor-pointer">B</button>
                    <button type="button" onclick="appliquerFormatTextProf('underline')" class="h-7 w-8 underline text-xs font-bold rounded hover:bg-slate-800 text-slate-300 transition-all cursor-pointer">U</button>
                    <button type="button" onclick="appliquerFormatTextProf('insertUnorderedList')" class="h-7 w-8 font-bold text-base rounded hover:bg-slate-800 text-slate-300 transition-all cursor-pointer flex items-center justify-center pb-0.5">•</button>
                </div>
                <div id="feedback-global-prof" contenteditable="true" oninput="synchroniserNotesLocales()" placeholder="Bilan général, points clés de la soutenance..." class="w-full bg-[#030712]/60 p-4 text-sm leading-relaxed text-white min-h-[120px] focus:outline-none transition-all overflow-y-auto [&_ul]:list-disc [&_ul]:pl-5"></div>
            </div>
        </div>

        <div class="pt-2">
            <button onclick="enregistrerToutesLesNotesFormateur()" class="w-full bg-[#a855f7] hover:bg-[#9333ea] text-white font-bold py-3.5 px-6 rounded-xl transition cursor-pointer shadow-lg shadow-purple-950/50 uppercase text-xs tracking-wider active:scale-[0.99]">
                💾 Enregistrer toutes les évaluations de la session
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        const urlParams = new URLSearchParams(window.location.search);
        const idSessionDashboard = urlParams.get('session_id');

        let groupesSession = [];
        let listeCriteresProf = [];
        let notesFormateurLocales = {}; 
        let ciblePrecedente = "";
        let evaluateurPrecedent = "";

        function appliquerFormatTextProf(commande) { document.execCommand(commande, false, null); }

        async function initFormulaire() {
            if (!idSessionDashboard) {
                document.getElementById('formulaire-container').innerHTML = "<p class='text-red-400 p-4 text-center'>❌ ID de session manquant.</p>";
                return;
            }
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const { data: s } = await db.from('sessions').select('nom').eq('id', idSessionDashboard).single();
            if(s) document.getElementById('nom-session').innerText = s.nom;

            const { data: evals } = await db.from('evaluateurs').select('nom').eq('session_id', idSessionDashboard).order('nom');
            const selectEval = document.getElementById('select-evaluateur');
            if(evals && evals.length > 0) evals.forEach(e => { selectEval.innerHTML += `<option value="${e.nom}">${e.nom}</option>`; });
            else selectEval.innerHTML += `<option value="Formateur Principal">Formateur Principal</option>`;
            
            evaluateurPrecedent = selectEval.value;

            const { data: g } = await db.from('groupes').select('*').eq('session_id', idSessionDashboard).order('nom');
            if(g && g.length > 0) {
                groupesSession = g;
                document.getElementById('select-sujet-evalue').innerHTML = g.map(grp => `<option value="${grp.nom}">${grp.nom}</option>`).join('');
                ciblePrecedente = document.getElementById('select-sujet-evalue').value;
            }

            const { data: critsProf } = await db.from('criteres').select('*').eq('session_id', idSessionDashboard);
            if(critsProf && critsProf.length > 0) {
                listeCriteresProf = critsProf;
                genererSlidersHtml();
            }

            await chargerNotesExistantes();
        }

        function mettreAJourCouleurBadgeProf(index, valeur) {
            const badge = document.getElementById(`badge-note-prof-${index}`);
            if(!badge) return;
            valeur = parseFloat(valeur);
            badge.innerText = valeur;
            
            badge.className = "flex items-center justify-center w-12 h-12 rounded-xl font-black text-xl border shadow-lg transition-colors duration-300 ";
            
            if (valeur < 2.5) {
                badge.className += "bg-red-500/10 text-red-400 border-red-500/30";
            } else if (valeur <= 3.5) {
                badge.className += "bg-amber-500/10 text-amber-400 border-amber-500/30";
            } else {
                badge.className += "bg-emerald-500/10 text-emerald-400 border-emerald-500/30";
            }
        }

        function genererSlidersHtml() {
            document.getElementById('conteneur-formateur-criteres').innerHTML = listeCriteresProf.map((c, index) => `
                <div class="bg-[#030712]/40 p-5 rounded-xl border border-slate-800/60 shadow-inner space-y-4">
                    
                    <div class="flex justify-between items-center gap-4">
                        <span class="text-slate-200 font-bold text-sm md:text-base leading-tight">🎯 ${c.nom}</span>
                        <div id="badge-note-prof-${index}" class="flex shrink-0 items-center justify-center w-12 h-12 rounded-xl bg-amber-500/10 text-amber-400 font-black text-xl border border-amber-500/30 shadow-lg">3</div>
                    </div>

                    <div class="relative pt-2 pb-4">
                        <input type="range" id="prof-crit-${index}" min="1" max="5" step="0.5" value="3" 
                            oninput="mettreAJourCouleurBadgeProf(${index}, this.value); synchroniserNotesLocales();" 
                            class="w-full h-3 bg-slate-800 rounded-full appearance-none cursor-pointer accent-[#a855f7] relative z-10 focus:outline-none">
                        
                        <div class="flex justify-between px-1.5 text-[11px] text-slate-500 mt-2 font-mono font-bold select-none">
                            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 pt-2 border-t border-slate-800/50">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">❓ Questions à poser :</label>
                            <textarea id="prof-questions-${index}" oninput="synchroniserNotesLocales()" rows="4" placeholder="Saut de ligne libre pour lister vos questions jury..." class="w-full bg-[#030712] border border-slate-800 text-slate-200 placeholder:text-slate-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-[#a855f7] transition-all resize-y min-h-[100px]"></textarea>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-slate-500 mb-1">📔 Prise de notes :</label>
                            <textarea id="prof-journal-${index}" oninput="synchroniserNotesLocales()" rows="4" placeholder="Saut de ligne libre pour vos remarques à chaud..." class="w-full bg-[#030712] border border-slate-800 text-slate-200 placeholder:text-slate-700 rounded-lg p-2.5 text-sm focus:outline-none focus:border-[#a855f7] transition-all resize-y min-h-[100px]"></textarea>
                        </div>
                    </div>
                </div>
            `).join('');

            listeCriteresProf.forEach((_, i) => mettreAJourCouleurBadgeProf(i, 3));
        }

        function decoderNoteEtCurseurs(notePleine) {
            if (!notePleine) return { noteGlobale: 0, sliders: [] };
            const chaineNote = Number(notePleine).toFixed(14);
            const parties = chaineNote.split('.');
            if (parties.length < 2) return { noteGlobale: notePleine, sliders: [] };
            
            const noteGlobaleInitiale = parseFloat(parties[0] + '.' + parties[1].substring(0, 4));
            let chaineDecimaleEmpreinte = parties[1].substring(4);
            let curseursRestitues = [];
            
            for (let i = 0; i < chaineDecimaleEmpreinte.length; i += 2) {
                let bloc = chaineDecimaleEmpreinte.substring(i, i + 2);
                if (bloc.length === 2) {
                    if (bloc === "00") break;
                    curseursRestitues.push(parseInt(bloc, 10) / 10);
                }
            }
            return { noteGlobale: noteGlobaleInitiale, sliders: curseursRestitues };
        }

        async function chargerNotesExistantes() {
            const evaluateurActuel = document.getElementById('select-evaluateur').value;
            if (!evaluateurActuel) return;

            const { data } = await db.from('evaluations').select('*').eq('session_id', idSessionDashboard).eq('groupe_votant', evaluateurActuel);
            notesFormateurLocales = {}; 
            
            if (data) {
                data.forEach(e => {
                    const extraction = decoderNoteEtCurseurs(e.note);
                    if (extraction.sliders.length === listeCriteresProf.length) {
                        notesFormateurLocales[e.sujet] = { sliders: extraction.sliders, questions: Array(listeCriteresProf.length).fill(""), journal: Array(listeCriteresProf.length).fill(""), feedback: "" };
                    }
                });
            }

            const cacheSauvegarde = localStorage.getItem(`cache_formateur_${idSessionDashboard}_${evaluateurActuel}`);
            if (cacheSauvegarde) Object.assign(notesFormateurLocales, JSON.parse(cacheSauvegarde));

            restituerSlidersPourCible(ciblePrecedente);
        }

        function synchroniserNotesLocales(groupeForce, evaluateurForce) {
            const evaluateurCible = evaluateurForce || document.getElementById('select-evaluateur').value;
            const groupeCible = groupeForce || document.getElementById('select-sujet-evalue').value;
            if (!groupeCible || !evaluateurCible) return;
            
            const tNotes = [], tQuestions = [], tJournal = [];

            for(let i=0; i < listeCriteresProf.length; i++) {
                const input = document.getElementById(`prof-crit-${i}`);
                const inputQ = document.getElementById(`prof-questions-${i}`);
                const inputJ = document.getElementById(`prof-journal-${i}`);

                tNotes.push(input ? parseFloat(input.value) : 3);
                tQuestions.push(inputQ ? inputQ.value : "");
                tJournal.push(inputJ ? inputJ.value : "");
