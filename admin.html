<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin — Gestion des Sessions</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 flex justify-between items-center shadow-xl">
            <div>
                <span class="bg-blue-950/50 text-blue-400 text-xs font-bold uppercase px-2.5 py-1 rounded border border-blue-800/50">⚙️ Panel Contrôle</span>
                <h1 class="text-2xl font-black text-white mt-1">Gestion des Évaluations</h1>
            </div>
        </div>

        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 space-y-4 shadow-xl">
            <h2 class="text-sm font-bold text-amber-400 uppercase tracking-wider">✨ Initialiser une nouvelle session</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Nom de la session :</label>
                    <input type="text" id="nouveau-nom-session" placeholder="Ex: Soutenance Bloc 1 - Groupe A" class="w-full bg-gray-950 rounded p-2.5 text-sm border border-gray-800 text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Critères (séparés par des virgules) :</label>
                    <input type="text" id="criteres-session" placeholder="Ex: Technique, Posture, Support" class="w-full bg-gray-950 rounded p-2.5 text-sm border border-gray-800 text-white focus:outline-none">
                </div>
            </div>
            <button onclick="creerSession()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 px-5 rounded-xl transition cursor-pointer">
                ➕ Créer la session et ses critères
            </button>
        </div>

        <div class="space-y-3">
            <h2 class="text-sm font-bold text-emerald-400 uppercase tracking-wider flex items-center gap-2">🟢 Sessions en cours (Évaluations ouvertes)</h2>
            <div id="liste-sessions-actives" class="space-y-3">
                </div>
        </div>

        <div class="space-y-3 pt-4 border-t border-gray-900">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">🗃️ Archives & Historique (Formulaires clos)</h2>
            <div id="liste-sessions-terminees" class="space-y-3">
                </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        async function initAdmin() {
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            chargerSessions();
        }

        async function chargerSessions() {
            const { data: sessions, error } = await db.from('sessions').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error("Erreur de chargement des sessions:", error);
                return;
            }

            const conteneurActives = document.getElementById('liste-sessions-actives');
            const conteneurTerminees = document.getElementById('liste-sessions-terminees');
            
            conteneurActives.innerHTML = "";
            conteneurTerminees.innerHTML = "";

            let countActives = 0;
            let countTerminees = 0;

            sessions.forEach(s => {
                // Remplacement dynamique du statut 'active' ou 'terminee'
                if (s.statut !== 'terminee') {
                    countActives++;
                    conteneurActives.innerHTML += `
                        <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 transition hover:border-gray-700">
                            <div>
                                <div class="font-bold text-white text-base">${s.nom}</div>
                                <div class="text-[10px] text-gray-500 font-mono mt-0.5">ID: ${s.id}</div>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <a href="vote.html?session_id=${s.id}" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-3 rounded-lg transition">🗳️ Lien Vote</a>
                                <a href="index.html?session_id=${s.id}" target="_blank" class="bg-amber-500 hover:bg-amber-600 text-gray-950 text-xs font-black py-2 px-3 rounded-lg transition">📊 Dashboard</a>
                                <button onclick="cloturerSession('${s.id}')" class="bg-red-950/40 hover:bg-red-900 text-red-400 hover:text-white text-xs font-bold py-2 px-3 rounded-lg border border-red-900/50 transition cursor-pointer">🔒 Clôturer</button>
                                <button onclick="dupliquerSession('${s.id}', '${s.nom}')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs font-bold py-2 px-3 rounded-lg border border-gray-700 transition cursor-pointer">👥 Dupliquer</button>
                            </div>
                        </div>
                    `;
                } else {
                    countTerminees++;
                    conteneurTerminees.innerHTML += `
                        <div class="bg-gray-900/40 p-4 rounded-xl border border-gray-800/60 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 opacity-75">
                            <div>
                                <div class="font-bold text-gray-400 text-base line-through/none">🗃️ ${s.nom}</div>
                                <span class="bg-gray-950 text-gray-500 text-[9px] font-mono uppercase px-1.5 py-0.5 rounded border border-gray-800">Clos / Archivé</span>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <a href="index.html?session_id=${s.id}" target="_blank" class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs font-bold py-2 px-4 rounded-lg border border-gray-700 transition">👁️ Consulter Dashboard</a>
                                <button onclick="dupliquerSession('${s.id}', '${s.nom}')" class="bg-gray-800 hover:bg-gray-700 text-gray-400 text-xs font-bold py-2 px-3 rounded-lg border border-gray-700 transition cursor-pointer">👥 Dupliquer</button>
                            </div>
                        </div>
                    `;
                }
            });

            if (countActives === 0) conteneurActives.innerHTML = `<p class="text-xs text-gray-500 italic p-2">Aucune session active en cours.</p>`;
            if (countTerminees === 0) conteneurTerminees.innerHTML = `<p class="text-xs text-gray-500 italic p-2">L'historique des archives est vide.</p>`;
        }

        async function creerSession() {
            const nomInput = document.getElementById('nouveau-nom-session').value.trim();
            const criteresInput = document.getElementById('criteres-session').value.trim();

            if (!nomInput) {
                alert("Veuillez donner un nom à la session.");
                return;
            }

            // 1. Insertion de la session (le statut prend 'active' par défaut via Supabase, ou on le force ici)
            const { data: nouvelleSession, error: errSess } = await db
                .from('sessions')
                .insert([{ nom: nomInput, statut: 'active' }])
                .select()
                .single();

            if (errSess) {
                alert("Erreur création session: " + errSess.message);
                return;
            }

            // 2. Traitement et insertion des critères s'il y en a
            if (criteresInput) {
                const tableauCriteres = criteresInput.split(',').map(c => c.trim()).filter(c => c !== "");
                if (tableauCriteres.length > 0) {
                    const objetsCriteres = tableauCriteres.map(nomCritere => ({
                        session_id: nouvelleSession.id,
                        nom: nomCritere
                    }));

                    const { error: errCrit } = await db.from('criteres').insert(objetsCriteres);
                    if (errCrit) alert("Session créée, mais échec de l'enregistrement des critères : " + errCrit.message);
                }
            }

            alert("🎉 Session créée avec succès !");
            document.getElementById('nouveau-nom-session').value = "";
            document.getElementById('criteres-session').value = "";
            chargerSessions();
        }

        async function cloturerSession(idSession) {
            if (!confirm("⚠️ Souhaitez-vous fermer cette session ?\n\nLe lien vers le formulaire de vote sera immédiatement désactivé pour les élèves, mais les notes et le dashboard resteront sauvegardés.")) return;

            const { error } = await db
                .from('sessions')
                .update({ statut: 'terminee' })
                .eq('id', idSession);

            if (!error) {
                alert("🔒 Session clôturée et déplacée dans l'historique.");
                chargerSessions();
            } else {
                alert("Erreur lors de la clôture : " + error.message);
            }
        }

        async function dupliquerSession(idSessionSource, nomActuel) {
            const nouveauNom = prompt(`Définir le nom de la copie basée sur [${nomActuel}] :`, `${nomActuel} - Groupe B`);
            if (!nouveauNom || nouveauNom.trim() === "") return;

            // 1. Créer la nouvelle session clonée (active par défaut)
            const { data: nouvelleSession, error: errSess } = await db
                .from('sessions')
                .insert([{ nom: nouveauNom.trim(), statut: 'active' }])
                .select()
                .single();

            if (errSess) {
                alert("Erreur lors de l'initialisation du clone : " + errSess.message);
                return;
            }

            // 2. Extraire les critères liés à l'ancienne session
            const { data: criteresSource, error: errCritFetch } = await db
                .from('criteres')
                .select('nom')
                .eq('session_id', idSessionSource);

            // 3. Injecter les critères copiés si la session d'origine en comportait
            if (!errCritFetch && criteresSource && criteresSource.length > 0) {
                const nouveauxCriteres = criteresSource.map(c => ({
                    session_id: nouvelleSession.id,
                    nom: c.nom
                }));

                const { error: errCritInsert } = await db.from('criteres').insert(nouveauxCriteres);
                if (errCritInsert) {
                    alert("⚠️ Session dupliquée mais échec du transfert des critères : " + errCritInsert.message);
                    return;
                }
            }

            alert("👥 Session et structure de critères dupliquées avec succès ! Vous pouvez y affecter vos élèves.");
            chargerSessions();
        }

        window.onload = initAdmin;
    </script>
</body>
</html>
