<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin — Espace Zen Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-pastel-sand: #e2c98a; /* Jaune ambre adouci, chic et reposant */
            --color-deep-blue: #1c4b84;
            --color-soft-blue: #3b6b9e; 
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen p-4 md:p-8 selection:bg-slate-700">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/40 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-md backdrop-blur-md">
            <div>
                <span class="text-[10px] font-semibold uppercase tracking-widest px-2.5 py-1 rounded-md border" style="background-color: rgba(226, 201, 138, 0.05); color: var(--color-pastel-sand); border-color: rgba(226, 201, 138, 0.15);">
                    ⚙️ Espace Gestion
                </span>
                <h1 class="text-2xl font-extrabold text-slate-100 mt-2 tracking-tight">Générateur de Sessions</h1>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/40 space-y-6 shadow-md backdrop-blur-md">
            <h2 class="text-xs font-bold uppercase tracking-wider border-b border-slate-700/40 pb-2.5 flex items-center gap-2" style="color: var(--color-pastel-sand);">
                <span>✨</span> Configurer et Générer une Session
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="flex flex-col justify-between space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1.5">Nom de la session :</label>
                        <input type="text" id="nouveau-nom-session" placeholder="Ex: Soutenance Bloc 1 - Master" class="w-full bg-slate-900/90 rounded-xl p-3 text-sm border border-slate-700/80 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-[var(--color-soft-blue)] transition-all">
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1.5">Critères d'évaluation (Un critère par ligne) :</label>
                        <textarea id="criteres-session" rows="8" placeholder="Ex: Technique : Maîtrise du code&#10;Posture : Clarté orale&#10;Support : Visuels des slides" class="w-full flex-1 bg-slate-900/90 rounded-xl p-3 text-sm border border-slate-700/80 text-slate-100 placeholder:text-slate-500 focus:outline-none font-sans min-h-[160px] focus:border-[var(--color-soft-blue)] transition-all"></textarea>
                        <p class="text-[10px] text-slate-500 mt-1.5 pl-1">Sautez à la ligne pour chaque nouveau critère.</p>
                    </div>
                </div>

                <div class="flex flex-col justify-between space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1.5">Nombre de Groupes :</label>
                            <input type="number" id="nb-groupes" min="1" value="3" class="w-full bg-slate-900/90 rounded-xl p-3 text-sm border border-slate-700/80 text-slate-100 focus:outline-none focus:border-[var(--color-soft-blue)] transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1.5">Préfixe des Groupes :</label>
                            <input type="text" id="prefixe-groupes" value="Groupe " class="w-full bg-slate-900/90 rounded-xl p-3 text-sm border border-slate-700/80 text-slate-100 focus:outline-none focus:border-[var(--color-soft-blue)] transition-all">
                        </div>
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1.5">Liste des apprenants (Un prénom par ligne) :</label>
                        <textarea id="liste-apprenants-brute" rows="8" placeholder="Thomas&#10;Julie&#10;Lucas" class="w-full flex-1 bg-slate-900/90 rounded-xl p-3 text-sm border border-slate-700/80 text-slate-100 placeholder:text-slate-500 focus:outline-none font-mono text-xs min-h-[160px] max-h-[300px] overflow-y-auto focus:border-[var(--color-soft-blue)] transition-all"></textarea>
                        <p class="text-[10px] text-slate-500 mt-1.5 pl-1">Ils seront automatiquement répartis équitablement.</p>
                    </div>
                </div>
            </div>

            <button onclick="genererSessionComplete()" class="w-full text-xs font-bold py-3.5 rounded-xl transition-all uppercase tracking-wider cursor-pointer shadow-md hover:brightness-110 active:scale-[0.99] text-white" style="background-color: var(--color-soft-blue);">
                🚀 Générer la session complète
            </button>
        </div>

        <div class="space-y-3">
            <h2 class="text-xs font-bold uppercase tracking-wider flex items-center gap-2 text-slate-400 pl-1">🟢 Sessions en cours</h2>
            <div id="liste-sessions-actives" class="space-y-3"></div>
        </div>

        <div class="space-y-3 pt-4 border-t border-slate-800">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2 pl-1">🗃️ Archives & Historique</h2>
            <div id="liste-sessions-terminees" class="space-y-2.5"></div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        async function initAdmin() {
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            chargerSessions();
        }

        async function chargerSessions() {
            const { data: sessions, error } = await db.from('sessions').select('*').order('created_at', { ascending: false });
            if (error) return;

            const conteneurActives = document.getElementById('liste-sessions-actives');
            const conteneurTerminees = document.getElementById('liste-sessions-terminees');
            
            conteneurActives.innerHTML = "";
            conteneurTerminees.innerHTML = "";

            let countActives = 0, countTerminees = 0;

            sessions.forEach(s => {
                if (s.statut !== 'terminee') {
                    countActives++;
                    conteneurActives.innerHTML += `
                        <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-700/40 flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 transition-all hover:border-slate-600/60 hover:bg-slate-800/50">
                            <div>
                                <div class="font-bold text-slate-100 text-base tracking-tight">${s.nom}</div>
                                <div class="text-[10px] text-slate-500 font-mono mt-0.5">ID: ${s.id}</div>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <a href="vote.html?session_id=${s.id}" target="_blank" class="text-white text-xs font-bold py-2 px-3.5 rounded-lg transition-all hover:brightness-110 active:scale-[0.97]" style="background-color: var(--color-soft-blue);">🗳️ Lien Vote</a>
                                <a href="index.html?session_id=${s.id}" target="_blank" class="text-slate-900 text-xs font-bold py-2 px-3.5 rounded-lg transition-all hover:brightness-110 active:scale-[0.97]" style="background-color: var(--color-pastel-sand);">📊 Dashboard</a>
                                <button onclick="cloturerSession('${s.id}')" class="bg-slate-900/60 text-red-300 hover:text-white hover:bg-red-950/40 text-xs py-2 px-3.5 rounded-lg border border-red-900/30 transition-all cursor-pointer active:scale-[0.97]">🔒 Clôturer</button>
                                <button onclick="dupliquerSession('${s.id}', '${s.nom}')" class="bg-slate-900/60 text-slate-400 hover:text-slate-200 text-xs py-2 px-3.5 rounded-lg border border-slate-700/50 transition-all cursor-pointer active:scale-[0.97]">👥 Dupliquer</button>
                            </div>
                        </div>
                    `;
                } else {
                    countTerminees++;
                    conteneurTerminees.innerHTML += `
                        <div class="bg-slate-900/30 p-4 rounded-xl border border-slate-800/80 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 opacity-50 transition-all hover:opacity-70">
                            <div>
                                <div class="font-medium text-slate-400 text-base">🗃️ ${s.nom}</div>
                                <span class="bg-slate-950 text-slate-500 text-[9px] font-mono uppercase px-2 py-0.5 rounded-md border border-slate-800 mt-1 inline-block">Clos / Archivé</span>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <a href="index.html?session_id=${s.id}" target="_blank" class="bg-slate-800/40 text-slate-400 hover:text-slate-200 text-xs py-2 px-4 rounded-lg border border-slate-700/30 transition-all">👁️ Consulter Dashboard</a>
                                <button onclick="dupliquerSession('${s.id}', '${s.nom}')" class="bg-slate-800/40 text-slate-500 text-xs py-2 px-3 rounded-lg border border-slate-700/30 transition-all cursor-pointer">👥 Dupliquer</button>
                            </div>
                        </div>
                    `;
                }
            });

            if (countActives === 0) conteneurActives.innerHTML = `<p class="text-xs text-slate-500 italic p-2">Aucune session active en cours.</p>`;
            if (countTerminees === 0) conteneurTerminees.innerHTML = `<p class="text-xs text-slate-500 italic p-2">L'historique des archives est vide.</p>`;
        }

        async function genererSessionComplete() {
            const nomSession = document.getElementById('nouveau-nom-session').value.trim();
            const criteresRaw = document.getElementById('criteres-session').value.trim();
            const nbGroupes = parseInt(document.getElementById('nb-groupes').value) || 1;
            const prefixe = document.getElementById('prefixe-groupes').value || "Groupe ";
            const apprenantsRaw = document.getElementById('liste-apprenants-brute').value.trim();

            if (!nomSession) {
                alert("Erreur : Le nom de la session est obligatoire.");
                return;
            }

            const { data: session, error: errSess } = await db.from('sessions').insert([{ nom: nomSession, statut: 'active' }]).select().single();
            if (errSess) { alert("Échec création session: " + errSess.message); return; }

            if (criteresRaw) {
                const arrCriteres = criteresRaw.split('\n').map(c => c.trim()).filter(c => c !== "");
                if (arrCriteres.length > 0) {
                    const payloadCriteres = arrCriteres.map(nom => ({ session_id: session.id, nom: nom }));
                    await db.from('criteres').insert(payloadCriteres);
                }
            }

            const listeNomsGroupes = [];
            const payloadGroupes = [];
            for (let i = 1; i <= nbGroupes; i++) {
                const nomDuGroupe = `${prefixe}${i}`;
                listeNomsGroupes.push(nomDuGroupe);
                payloadGroupes.push({ session_id: session.id, nom: nomDuGroupe });
            }
            const { data: groupesInseres, error: errGrp } = await db.from('groupes').insert(payloadGroupes).select();
            if (errGrp) { alert("Erreur lors de la génération des groupes : " + errGrp.message); return; }

            const mapNomVersIdGroupe = {};
            groupesInseres.forEach(g => { mapNomVersIdGroupe[g.nom] = g.id; });

            if (apprenantsRaw) {
                let listeApprenants = apprenantsRaw.split('\n').map(a => a.trim()).filter(a => a !== "");
                
                if (listeApprenants.length > 0) {
                    for (let i = listeApprenants.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [listeApprenants[i], listeApprenants[j]] = [listeApprenants[j], listeApprenants[i]];
                    }

                    const payloadApprenants = listeApprenants.map((prenom, index) => {
                        const nomGroupeAssigne = listeNomsGroupes[index % nbGroupes];
                        return {
                            session_id: session.id,
                            prenom: prenom,
                            groupe_id: mapNomVersIdGroupe[nomGroupeAssigne]
                        };
                    });

                    const { error: errApp } = await db.from('apprenants').insert(payloadApprenants);
                    if (errApp) alert("Attention : Échec de la répartition des apprenants : " + errApp.message);
                }
            }

            alert("🎉 Session complète configurée et générée avec succès !");
            document.getElementById('nouveau-nom-session').value = "";
            document.getElementById('criteres-session').value = "";
            document.getElementById('liste-apprenants-brute').value = "";
            chargerSessions();
        }

        async function cloturerSession(idSession) {
            if (!confirm("⚠️ Fermer définitivement cette session ?\n\nLe lien de vote sera clos pour les élèves, les données resteront sécurisées dans l'historique.")) return;
            const { error } = await db.from('sessions').update({ statut: 'terminee' }).eq('id', idSession);
            if (!error) chargerSessions();
        }

        async function dupliquerSession(idSessionSource, nomActuel) {
            const nouveauNom = prompt(`Définir le nom de la copie basée sur [${nomActuel}] :`, `${nomActuel} - Groupe B`);
            if (!nouveauNom || nouveauNom.trim() === "") return;

            const { data: nouvelleSession, error: errSess } = await db.from('sessions').insert([{ nom: nouveauNom.trim(), statut: 'active' }]).select().single();
            if (errSess) return;

            const { data: criteresSource } = await db.from('criteres').select('nom').eq('session_id', idSessionSource);
            if (criteresSource && criteresSource.length > 0) {
                const nouveauxCriteres = criteresSource.map(c => ({ session_id: nouvelleSession.id, nom: c.nom }));
                await db.from('criteres').insert(nouveauxCriteres);
            }

            alert("👥 Session et critères dupliqués ! (Pensez à recréer/réaffecter vos groupes d'élèves pour cette nouvelle session).");
            chargerSessions();
        }

        window.onload = initAdmin;
    </script>
</body>
</html>
