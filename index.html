<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Sessions — Console Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#1e2640] text-[#e2e8f0] font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-[#293556] p-6 rounded-2xl border border-[#37466f] shadow-lg">
            <span class="bg-amber-400/10 text-amber-300 text-xs font-bold uppercase px-2.5 py-1 rounded border border-amber-400/20">⚙️ ESPACE GESTION</span>
            <h1 class="text-3xl font-black text-white mt-2 tracking-tight">Générateur de Sessions</h1>
        </div>

        <div class="bg-[#293556] p-6 rounded-2xl border border-[#37466f] space-y-6 shadow-lg">
            <h2 class="text-xs font-bold uppercase tracking-wider text-amber-300 flex items-center gap-2 border-b border-[#37466f] pb-3">
                ✨ CONFIGURER ET GÉNÉRER UNE SESSION
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-1">
                    <label class="block text-xs uppercase text-slate-300 mb-1.5 font-bold tracking-wide">Nom de la session :</label>
                    <input type="text" id="input-nom-session" placeholder="Ex: Soutenance Bloc 1 - Master" 
                        class="w-full bg-[#182035] rounded-xl p-3 text-sm border border-[#37466f] text-white placeholder-slate-500 focus:outline-none focus:border-indigo-400 transition">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-300 mb-1.5 font-bold tracking-wide">Nombre de groupes :</label>
                    <input type="number" id="input-nb-groupes" placeholder="3" min="1"
                        class="w-full bg-[#182035] rounded-xl p-3 text-sm border border-[#37466f] text-white placeholder-slate-500 focus:outline-none focus:border-indigo-400 transition">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-300 mb-1.5 font-bold tracking-wide">Préfixe des groupes :</label>
                    <input type="text" id="input-prefixe-groupes" placeholder="Groupe"
                        class="w-full bg-[#182035] rounded-xl p-3 text-sm border border-[#37466f] text-white placeholder-slate-500 focus:outline-none focus:border-indigo-400 transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs uppercase text-slate-300 mb-1.5 font-bold tracking-wide">Critères d'évaluation (un critère par ligne) :</label>
                    <textarea id="txt-criteres" rows="5" placeholder="Ex: Technique : Maîtrise du code&#10;Posture : Clarté orale&#10;Support : Visuels des slides"
                        class="w-full bg-[#182035] rounded-xl p-3 text-sm border border-[#37466f] text-white placeholder-slate-500 focus:outline-none focus:border-indigo-400 transition font-mono"></textarea>
                    <p class="text-[11px] text-slate-400 mt-1">Sautez à la ligne pour chaque nouveau critère.</p>
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-300 mb-1.5 font-bold tracking-wide">Liste des apprenants (un prénom par ligne) :</label>
                    <textarea id="txt-apprenants" rows="5" placeholder="Thomas&#10;Julie&#10;Lucas"
                        class="w-full bg-[#182035] rounded-xl p-3 text-sm border border-[#37466f] text-white placeholder-slate-500 focus:outline-none focus:border-indigo-400 transition font-mono"></textarea>
                    <p class="text-[11px] text-slate-400 mt-1">Ils seront automatiquement répartis équitablement.</p>
                </div>
            </div>

            <button onclick="genererSessionComplete()" 
                class="w-full bg-[#4f73a1] hover:bg-[#5f84b3] text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition shadow-md cursor-pointer flex items-center justify-center gap-2 border border-[#6d94c7]/30">
                🚀 Générer la session complète
            </button>
        </div>

        <div class="bg-[#293556] p-6 rounded-2xl border border-[#37466f] space-y-4 shadow-lg">
            <h2 class="text-xs font-bold uppercase tracking-wider text-emerald-300 flex items-center gap-2 border-b border-[#37466f] pb-3">
                🟢 Sessions en cours
            </h2>
            
            <div id="liste-sessions" class="space-y-3">
                <p class="text-xs text-slate-400 italic">Chargement des sessions...</p>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        async function init() {
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            chargerSessions();
        }

        async function chargerSessions() {
            const { data: sessions, error } = await db.from('sessions').select('*').order('created_at', { ascending: false });
            if (error) return;

            const conteneur = document.getElementById('liste-sessions');
            if (sessions.length === 0) {
                conteneur.innerHTML = `<p class="text-xs text-slate-400 italic py-2">Aucune session active.</p>`;
                return;
            }

            // Version aux éclats pastel clairs et doux sur fond bleu nuit intermédiaire
            conteneur.innerHTML = sessions.map(s => `
                <div class="bg-[#182035] p-4 rounded-xl border border-[#37466f]/60 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-[#485b8f] transition shadow-inner">
                    <div>
                        <h3 class="text-base font-bold text-white tracking-tight">${s.nom}</h3>
                        <p class="text-[10px] font-mono text-slate-400 mt-0.5">ID: ${s.id}</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                        <a href="vote.html?session_id=${s.id}" target="_blank" class="flex-1 sm:flex-initial text-center bg-[#a5f3fc]/10 hover:bg-[#a5f3fc]/20 text-[#67e8f9] text-xs font-bold py-2 px-4 rounded-lg border border-[#22d3ee]/30 transition">
                            🗳️ Lien Vote
                        </a>
                        <a href="dashboard.html?session_id=${s.id}" target="_blank" class="flex-1 sm:flex-initial text-center bg-[#fef08a]/10 hover:bg-[#fef08a]/20 text-[#fde047] text-xs font-bold py-2 px-4 rounded-lg border border-[#facc15]/30 transition">
                            📊 Dashboard
                        </a>
                        <button onclick="cloturerSession('${s.id}')" class="flex-1 sm:flex-initial bg-[#fca5a5]/10 hover:bg-[#fca5a5]/20 text-[#fca5a5] text-xs font-bold py-2 px-4 rounded-lg border border-[#f87171]/30 transition cursor-pointer">
                            🔒 Clôturer
                        </button>
                        <button onclick="dupliquerSession('${s.id}')" class="flex-1 sm:flex-initial bg-[#c7d2fe]/10 hover:bg-[#c7d2fe]/20 text-[#c7d2fe] text-xs font-bold py-2 px-4 rounded-lg border border-[#818cf8]/30 transition cursor-pointer">
                            👥 Dupliquer
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function genererSessionComplete() {
            const nom = document.getElementById('input-nom-session').value.trim();
            const nbGroupes = parseInt(document.getElementById('input-nb-groupes').value) || 3;
            const prefixe = document.getElementById('input-prefixe-groupes').value.trim() || "Groupe";
            const critsRaw = document.getElementById('txt-criteres').value.split('\n').filter(l => l.trim() !== '');
            const elevesRaw = document.getElementById('txt-apprenants').value.split('\n').filter(l => l.trim() !== '');

            if (!nom) { alert("Veuillez donner un nom à la session."); return; }
            if (critsRaw.length === 0) { alert("Veuillez entrer au moins un critère."); return; }

            const { data: sessionData, error: sErr } = await db.from('sessions').insert([{ nom }]).select().single();
            if (sErr || !sessionData) return;
            const sessionId = sessionData.id;

            const listeCriteres = critsRaw.map(c => ({ session_id: sessionId, nom: c.trim() }));
            await db.from('criteres').insert(listeCriteres);

            const listeGroupes = [];
            for (let i = 1; i <= nbGroupes; i++) {
                listeGroupes.push({ session_id: sessionId, nom: `${prefixe} ${i}`, membres: [] });
            }

            elevesRaw.forEach((eleve, idx) => {
                const targetGroupIndex = idx % nbGroupes;
                listeGroupes[targetGroupIndex].membres.push(eleve.trim());
            });

            await db.from('groupes').insert(listeGroupes);

            document.getElementById('input-nom-session').value = '';
            document.getElementById('txt-criteres').value = '';
            document.getElementById('txt-apprenants').value = '';
            chargerSessions();
        }

        async function cloturerSession(id) {
            if(confirm("Voulez-vous vraiment clore (supprimer) cette session ?")) {
                await db.from('sessions').delete().eq('id', id);
                chargerSessions();
            }
        }

        async function dupliquerSession(id) {
            const { data: s } = await db.from('sessions').select('*').eq('id', id).single();
            if(!s) return;
            
            const { data: nouvelleSession } = await db.from('sessions').insert([{ nom: `${s.nom} (Copie)` }]).select().single();
            if(!nouvelleSession) return;

            const { data: crits } = await db.from('criteres').select('*').eq('session_id', id);
            if(crits) {
                await db.from('criteres').insert(crits.map(c => ({ session_id: nouvelleSession.id, nom: c.nom })));
            }

            const { data: grps } = await db.from('groupes').select('*').eq('session_id', id);
            if(grps) {
                await db.from('groupes').insert(grps.map(g => ({ session_id: nouvelleSession.id, nom: g.nom, membres: g.membres })));
            }

            chargerSessions();
        }

        window.onload = init;
    </script>
</body>
</html>
