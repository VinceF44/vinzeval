<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Session — Espace Zen Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-slate-200 font-sans min-h-screen p-4 md:p-8 selection:bg-[#2563eb]/30">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-[#101828] p-6 rounded-2xl border border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-md">
            <div>
                <span class="text-[10px] font-semibold uppercase tracking-widest px-2.5 py-1 rounded-md border bg-[#030712]/50 text-[#fe9a00] border-[#fe9a00]/30">
                    📊 Résultats en Temps Réel
                </span>
                <h1 id="nom-session" class="text-2xl font-extrabold text-slate-100 mt-2 tracking-tight">Chargement de la session...</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="statut-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-slate-800 text-slate-400">--</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-[#101828] p-6 rounded-2xl border border-slate-800 space-y-5 shadow-md h-fit">
                <h2 class="text-xs font-bold uppercase tracking-wider border-b border-slate-800 pb-2.5 flex items-center gap-2 text-[#fe9a00]">
                    <span>👨‍🏫</span> Évaluation du Formateur
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-400 mb-1.5">Sélectionner le Groupe :</label>
                        <select id="select-groupe" class="w-full bg-[#030712] rounded-xl p-3 text-sm border border-slate-800 text-slate-100 focus:outline-none focus:border-[#3b82f6] transition-all">
                            <option value="">-- Choisir un groupe --</option>
                        </select>
                    </div>

                    <div id="zone-criteres-formateur" class="space-y-3.5 pt-2">
                        <p class="text-xs text-slate-500 italic">Sélectionnez un groupe pour afficher les critères.</p>
                    </div>

                    <button onclick="soumettreVoteFormateur()" class="w-full text-xs font-bold py-3.5 rounded-xl transition-all uppercase tracking-wider cursor-pointer shadow-md text-white bg-[#2563eb] border border-blue-500/20 hover:bg-[#1d4ed8] active:scale-[0.99]">
                        💾 Enregistrer la note formateur
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-[#101828] p-6 rounded-2xl border border-slate-800 space-y-4 shadow-md">
                <h2 class="text-xs font-bold uppercase tracking-wider border-b border-slate-800 pb-2.5 flex items-center gap-2 text-emerald-400">
                    <span>🏆</span> Classement Général (Moyenne Globale)
                </h2>
                <div id="liste-classement" class="space-y-3">
                    <p class="text-xs text-slate-500 italic">Calcul des résultats en cours...</p>
                </div>
            </div>

        </div>

        <div class="space-y-4">
            <h2 class="text-xs font-bold uppercase tracking-wider flex items-center gap-2 text-slate-400 pl-1">🎯 Analyse détaillée par Groupe</h2>
            <div id="zone-details-groupes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;
        let sessionId = new URLSearchParams(window.location.search).get('session_id');

        let listeCriteres = [];
        let listeGroupes = [];

        async function initDashboard() {
            if (!sessionId) {
                document.getElementById('nom-session').innerText = "Erreur : Aucun ID de session fourni.";
                return;
            }
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            await chargerInfosSession();
            await chargerCriteres();
            await chargerGroupesEtApprenants();
            await calculerEtAfficherResultats();

            // Rafraîchissement automatique toutes les 10 secondes pour le live
            setInterval(calculerEtAfficherResultats, 10000);
        }

        async function chargerInfosSession() {
            const { data, error } = await db.from('sessions').select('*').eq('id', sessionId).single();
            if (error || !data) return;
            document.getElementById('nom-session').innerText = data.nom;
            const badge = document.getElementById('statut-badge');
            if (data.statut === 'active') {
                badge.innerText = "🟢 En Cours";
                badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-emerald-950/50 text-emerald-400 border border-emerald-800/40";
            } else {
                badge.innerText = "🔒 Clôturée";
                badge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-950/50 text-red-400 border border-red-800/40";
            }
        }

        async function chargerCriteres() {
            const { data, error } = await db.from('criteres').select('*').eq('session_id', sessionId);
            if (!error && data) listeCriteres = data;
        }

        async function chargerGroupesEtApprenants() {
            // Récupération des groupes
            const { data: groupes, error: errG } = await db.from('groupes').select('*').eq('session_id', sessionId).order('nom');
            if (errG || !groupes) return;
            listeGroupes = groupes;

            // Récupération des apprenants de la session pour les associer aux groupes
            const { data: apprenants, error: errA } = await db.from('apprenants').select('*').eq('session_id', sessionId);
            const select = document.getElementById('select-groupe');
            select.innerHTML = '<option value="">-- Choisir un groupe --</option>';

            listeGroupes.forEach(g => {
                // Filtrer les apprenants appartenant à ce groupe spécifique
                const prénomsDuGroupe = apprenants 
                    ? apprenants.filter(a => a.groupe_id === g.id).map(a => a.prenom).join(', ')
                    : '';
                
                // Formatage du libellé : "Groupe 1 (Thomas, Julie, Lucas)"
                const textAffichage = prénomsDuGroupe ? `${g.nom} (${prénomsDuGroupe})` : g.nom;

                const opt = document.createElement('option');
                opt.value = g.id;
                opt.innerText = textAffichage;
                select.appendChild(opt);
            });
        }

        // Ecouteur pour générer la zone de saisie des notes du formateur quand un groupe est sélectionné
        document.getElementById('select-groupe').addEventListener('change', async (e) => {
            const groupeId = e.target.value;
            const zone = document.getElementById('zone-criteres-formateur');
            if (!groupeId) {
                zone.innerHTML = `<p class="text-xs text-slate-500 italic">Sélectionnez un groupe pour afficher les critères.</p>`;
                return;
            }

            // Chercher si des notes formateur existent déjà pour ce groupe
            const { data: notesExistantes } = await db.from('votes_formateur').select('*').eq('groupe_id', groupeId);
            const mapNotes = {};
            if (notesExistantes) {
                notesExistantes.forEach(n => { mapNotes[n.critere_id] = n.note; });
            }

            zone.innerHTML = "";
            listeCriteres.forEach(c => {
                const noteActuelle = mapNotes[c.id] !== undefined ? mapNotes[c.id] : "";
                zone.innerHTML += `
                    <div class="flex items-center justify-between gap-4 p-2.5 rounded-lg bg-[#030712] border border-slate-800">
                        <label class="text-xs font-medium text-slate-300 truncate">${c.nom}</label>
                        <input type="number" data-critere-id="${c.id}" min="0" max="20" step="0.5" value="${noteActuelle}" placeholder="Note /20" class="w-20 bg-[#101828] text-center rounded-md p-1.5 text-xs font-bold border border-slate-700 focus:outline-none focus:border-[#3b82f6] text-slate-100">
                    </div>
                `;
            });
        });

        async function soumettreVoteFormateur() {
            const groupeId = document.getElementById('select-groupe').value;
            if (!groupeId) { alert("Veuillez sélectionner un groupe."); return; }

            const inputs = document.querySelectorAll('#zone-criteres-formateur input');
            const payload = [];

            for (let input of inputs) {
                const critereId = input.getAttribute('data-critere-id');
                const val = parseFloat(input.value);
                if (isNaN(val) || val < 0 || val > 20) {
                    alert("Toutes les notes doivent être comprises entre 0 et 20.");
                    return;
                }
                payload.push({
                    session_id: sessionId,
                    groupe_id: groupeId,
                    critere_id: critereId,
                    note: val
                });
            }

            // Nettoyage des anciennes notes du formateur pour ce groupe précis
            await db.from('votes_formateur').delete().eq('groupe_id', groupeId);
            
            // Enregistrement des nouvelles notes
            const { error } = await db.from('votes_formateur').insert(payload);
            if (error) {
                alert("Erreur lors de la sauvegarde : " + error.message);
            } else {
                alert("🎯 Notes du formateur enregistrées !");
                calculerEtAfficherResultats();
            }
        }

        async function calculerEtAfficherResultats() {
            if (!sessionId || listeGroupes.length === 0 || listeCriteres.length === 0) return;

            // Récupération globale de la data brute
            const { data: votesEleves } = await db.from('votes_eleves').select('*').eq('session_id', sessionId);
            const { data: votesFormateur } = await db.from('votes_formateur').select('*').eq('session_id', sessionId);

            const bilanGroupes = [];

            listeGroupes.forEach(g => {
                let sommeMoyennesCriteres = 0;
                const detailsCriteres = [];

                listeCriteres.forEach(c => {
                    // 1. Calcul de la moyenne des élèves pour ce critère
                    const votesE = votesEleves ? votesEleves.filter(v => v.groupe_id === g.id && v.critere_id === c.id) : [];
                    const moyEleves = votesE.length > 0 ? (votesE.reduce((sum, v) => sum + v.note, 0) / votesE.length) : null;

                    // 2. Récupération de la note du formateur pour ce critère
                    const voteF = votesFormateur ? votesFormateur.find(v => v.groupe_id === g.id && v.critere_id === c.id) : null;
                    const noteFormateur = voteF ? voteF.note : null;

                    // 3. Calcul de la moyenne combinée (Pondération 50/50 si les deux existent)
                    let noteCombinee = 0;
                    if (moyEleves !== null && noteFormateur !== null) {
                        noteCombinee = (moyEleves + noteFormateur) / 2;
                    } else if (moyEleves !== null) {
                        noteCombinee = moyEleves;
                    } else if (noteFormateur !== null) {
                        noteCombinee = noteFormateur;
                    } else {
                        noteCombinee = 0; // Pas encore évalué
                    }

                    sommeMoyennesCriteres += noteCombinee;
                    detailsCriteres.push({
                        nom: c.nom,
                        eleves: moyEleves,
                        formateur: noteFormateur,
                        globale: noteCombinee
                    });
                });

                const moyenneGeneraleGroupe = detailsCriteres.length > 0 ? (sommeMoyennesCriteres / detailsCriteres.length) : 0;

                bilanGroupes.push({
                    id: g.id,
                    nom: g.nom,
                    moyenneGenerale: moyenneGeneraleGroupe,
                    criteres: detailsCriteres
                });
            });

            // Tri pour le classement décroissant
            bilanGroupes.sort((a, b) => b.moyenneGenerale - a.moyenneGenerale);

            // RENDER 1 : CLASSEMENT GENERAL
            const conteneurClassement = document.getElementById('liste-classement');
            conteneurClassement.innerHTML = "";
            bilanGroupes.forEach((g, index) => {
                let medaille = "🔹";
                if (index === 0) medaille = "🥇";
                if (index === 1) medaille = "🥈";
                if (index === 2) medaille = "🥉";

                conteneurClassement.innerHTML += `
                    <div class="flex items-center justify-between p-4 rounded-xl bg-[#030712] border border-slate-800 transition-all hover:border-slate-700">
                        <div class="flex items-center gap-3">
                            <span class="text-lg font-bold w-6 text-center">${index + 1}</span>
                            <span class="text-base">${medaille}</span>
                            <span class="font-bold text-slate-100 tracking-tight">${g.nom}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-base font-black text-[#fe9a00]">${g.moyenneGenerale.toFixed(2)}</span>
                            <span class="text-[10px] text-slate-500 block">/20</span>
                        </div>
                    </div>
                `;
            });

            // RENDER 2 : DETAILED ANALYSIS CARDS
            const conteneurCards = document.getElementById('zone-details-groupes');
            conteneurCards.innerHTML = "";
            bilanGroupes.forEach(g => {
                let htmlCriteres = "";
                g.criteres.forEach(c => {
                    const txtE = c.eleves !== null ? c.eleves.toFixed(1) : "--";
                    const txtF = c.formateur !== null ? c.formateur.toFixed(1) : "--";
                    htmlCriteres += `
                        <div class="space-y-1 border-b border-slate-900 pb-2 last:border-0 last:pb-0">
                            <div class="flex justify-between items-center text-xs">
                                <span class="font-medium text-slate-300 truncate max-w-[150px]">${c.nom}</span>
                                <span class="font-bold text-[#3b82f6]">${c.globale.toFixed(1)} <span class="text-[9px] text-slate-500">/20</span></span>
                            </div>
                            <div class="flex justify-between text-[10px] text-slate-500 pl-1">
                                <span>👥 Éleves: <strong class="text-slate-400">${txtE}</strong></span>
                                <span>👨‍🏫 Formateur: <strong class="text-slate-400">${txtF}</strong></span>
                            </div>
                        </div>
                    `;
                });

                conteneurCards.innerHTML += `
                    <div class="bg-[#101828] p-5 rounded-2xl border border-slate-800 space-y-4 shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start border-b border-slate-800 pb-2.5">
                                <h3 class="font-extrabold text-slate-100 text-base tracking-tight">${g.nom}</h3>
                                <div class="text-right">
                                    <span class="text-lg font-black text-emerald-400">${g.moyenneGenerale.toFixed(2)}</span>
                                    <span class="text-[9px] text-slate-500 block">Moyenne</span>
                                </div>
                            </div>
                            <div class="space-y-3 pt-3">
                                ${htmlCriteres}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
