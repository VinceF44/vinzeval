<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Master — Graphique Radar 360°</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-xl">
            <div>
                <span class="bg-amber-950/50 text-amber-400 text-xs font-bold uppercase px-2.5 py-1 rounded border border-amber-800/50">👑 Console Master & Radar 360°</span>
                <h1 id="nom-session" class="text-2xl font-black text-white mt-1">Chargement du Dashboard...</h1>
            </div>
            <button onclick="chargerDonneesDashboard()" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold py-2 px-4 rounded-lg border border-gray-700 transition cursor-pointer">🔄 Synchroniser le Live</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 space-y-4 h-fit">
                <h2 class="text-base font-bold text-amber-400 border-b border-gray-800 pb-2 flex items-center gap-2">👨‍🏫 Évaluation Formateur (Échelle 1-5)</h2>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Sélectionner l'équipe évaluée :</label>
                        <select id="select-groupe-formateur" onchange="mettreAjourGraphiqueRadar()" class="w-full bg-gray-950 rounded p-2 text-sm border border-gray-800 text-white focus:outline-none"></select>
                    </div>

                    <div id="conteneur-formateur-criteres" class="space-y-4 pt-2">
                        <p class="text-xs text-gray-500 text-center py-2">Chargement des critères...</p>
                    </div>

                    <button onclick="enregistrerNoteFormateur()" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-950 font-black py-2.5 rounded-xl text-xs uppercase transition shadow cursor-pointer">💾 Valider ma note</button>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 flex flex-col justify-between items-center min-h-[400px]">
                <div class="w-full border-b border-gray-800 pb-2 mb-4">
                    <h2 class="text-base font-bold text-white">🎯 Graphique Radar d'Évaluation Croisée</h2>
                    <p class="text-[10px] text-gray-400">Visualisation comparative des curseurs (Échelle 1-5).</p>
                </div>
                <div class="w-full max-w-[320px] aspect-square flex items-center justify-center">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 space-y-4 flex flex-col justify-between">
                <div>
                    <h2 class="text-base font-bold text-white border-b border-gray-800 pb-2">📈 Recapitulatif Général & Note Finale (/20)</h2>
                    <div class="overflow-x-auto mt-2">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="border-b border-gray-800 text-gray-400 font-mono text-[10px] uppercase">
                                    <th class="py-2">Équipe</th>
                                    <th class="py-2 text-center">Lucidité</th>
                                    <th class="py-2 text-center text-green-400">Modif</th>
                                    <th class="py-2 text-right text-indigo-400">Finale</th>
                                </tr>
                            </thead>
                            <tbody id="table-corps-resultats" class="divide-y divide-gray-800/50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        let db;

        const urlParams = new URLSearchParams(window.location.search);
        const idSessionDashboard = urlParams.get('session_id');

        let groupesSession = [];
        let evaluationsSession = [];
        let listeCriteresProf = [];
        let notesFormateurLocales = {}; // Stockage format : { 'Groupe A': [3, 4, 5] } (Notes sur 5 par critère)
        let monRadarChart = null;

        async function initDashboard() {
            if (!idSessionDashboard) {
                document.getElementById('nom-session').innerText = "⚠️ Erreur : ID session manquant.";
                return;
            }
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const { data: s } = await db.from('sessions').select('nom').eq('id', idSessionDashboard).single();
            if(s) document.getElementById('nom-session').innerText = `📊 Session : ${s.nom}`;

            const { data: g } = await db.from('groupes').select('*').eq('session_id', idSessionDashboard);
            if(g) {
                groupesSession = g;
                document.getElementById('select-groupe-formateur').innerHTML = g.map(grp => `<option value="${grp.nom}">${grp.nom}</option>`).join('');
            }

            // Chargement des critères dynamiques de la session
            const { data: critsProf } = await db.from('criteres').select('*').eq('session_id', idSessionDashboard);
            const conteneurProf = document.getElementById('conteneur-formateur-criteres');
            if(critsProf && critsProf.length > 0) {
                listeCriteresProf = critsProf;
                conteneurProf.innerHTML = critsProf.map((c, index) => `
                    <div>
                        <div class="flex justify-between text-xs mb-1"><span class="text-gray-400">🎯 ${c.nom}</span><span id="v-f-${index}" class="text-amber-400 font-bold font-mono">3 / 5</span></div>
                        <input type="range" id="prof-crit-${index}" min="1" max="5" step="0.5" value="3" oninput="document.getElementById('v-f-${index}').innerText=this.value+' / 5'" class="w-full accent-amber-500 h-1 bg-gray-950 rounded-lg appearance-none cursor-pointer">
                    </div>
                `).join('');
            }

            // Initialiser le graphique radar avec des données vides
            creerGraphiqueRadarVide();

            chargerDonneesDashboard();
            setInterval(chargerDonneesDashboard, 5000);
        }

        async function chargerDonneesDashboard() {
            const { data: evals, error } = await db.from('evaluations').select('*').eq('session_id', idSessionDashboard);
            if (!error && evals) {
                evaluationsSession = evals;
                calculerEtAfficherTout();
            }
        }

        function enregistrerNoteFormateur() {
            const groupeCible = document.getElementById('select-groupe-formateur').value;
            const tableauNotes = [];
            
            for(let i=0; i < listeCriteresProf.length; i++) {
                tableauNotes.push(parseFloat(document.getElementById(`prof-crit-${i}`).value));
            }

            notesFormateurLocales[groupeCible] = tableauNotes;
            alert(`Note enregistrée à l'échelle pour l'équipe ${groupeCible} ! 👨‍🏫`);
            calculerEtAfficherTout();
        }

        function calculerEtAfficherTout() {
            const corpsTable = document.getElementById('table-corps-resultats');
            corpsTable.innerHTML = '';

            const synthese = {};
            const ecartsLucidite = {};

            groupesSession.forEach(g => {
                synthese[g.nom] = { pairs: [], auto: null };
                ecartsLucidite[g.nom] = { somme: 0, count: 0 };
            });

            evaluationsSession.forEach(e => {
                // Conversion de la note stockée (sur 20) vers l'échelle 1-5 pour l'affichage radar
                const noteSur5 = (e.note_structure / 20) * 5;

                if (synthese[e.sujet]) {
                    if (e.evaluateur === e.sujet) {
                        synthese[e.sujet].auto = noteSur5;
                    } else {
                        synthese[e.sujet].pairs.push(noteSur5);
                    }
                }

                // Calcul Lucidité : Écart par rapport à la moyenne du prof sur 5
                const profNotes = notesFormateurLocales[e.sujet];
                if (profNotes && e.evaluateur !== e.sujet) {
                    const moyProfSur5 = profNotes.reduce((a,b)=>a+b,0) / profNotes.length;
                    ecartsLucidite[e.evaluateur].somme += Math.abs(noteSur5 - moyProfSur5);
                    ecartsLucidite[e.evaluateur].count += 1;
                }
            });

            groupesSession.forEach(g => {
                const nom = g.nom;
                const profNotes = notesFormateurLocales[nom];
                const moyProfSur5 = profNotes ? (profNotes.reduce((a,b)=>a+b,0) / profNotes.length) : null;
                const noteProfSur20 = moyProfSur5 ? (moyProfSur5 / 5) * 20 : null;

                const structureLucidite = ecartsLucidite[nom];
                const indexLucidite = structureLucidite.count > 0 ? (structureLucidite.somme / structureLucidite.count) : null;

                // Application Bonus/Malus sur l'échelle 1-5 adaptif (Seuil d'écart : < 0.4 = bonus, > 0.9 = malus)
                let modificateur = 0;
                let badge = `<span class="text-gray-500">0.00</span>`;
                if(indexLucidite !== null) {
                    if(indexLucidite <= 0.4) { modificateur = 1; badge = `<span class="text-green-400 font-bold">+1.00</span>`; }
                    else if(indexLucidite >= 0.9) { modificateur = -1; badge = `<span class="text-red-400 font-bold">-1.00</span>`; }
                }

                let noteFinale = "--";
                if (noteProfSur20 !== null) {
                    noteFinale = Math.min(20, Math.max(0, noteProfSur20 + modificateur)).toFixed(2);
                }

                corpsTable.innerHTML += `
                    <tr class="border-b border-gray-800/40">
                        <td class="py-2.5 font-bold text-white">${nom}</td>
                        <td class="py-2.5 text-center font-mono text-gray-400">${indexLucidite !== null ? `±${indexLucidite.toFixed(2)}` : '--'}</td>
                        <td class="py-2.5 text-center">${badge}</td>
                        <td class="py-2.5 text-right text-indigo-400 font-black">${noteFinale}</td>
                    </tr>
                `;
            });

            mettreAjourGraphiqueRadar();
        }

        function creerGraphiqueRadarVide() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            monRadarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: listeCriteresProf.map(c => c.nom),
                    datasets: [
                        { label: 'Formateur', data: [], borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', borderWidth: 2 },
                        { label: 'Auto-Éval', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2 },
                        { label: 'Pairs', data: [], borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', borderWidth: 2 }
                    ]
                },
                options: {
                    scales: { r: { min: 1, max: 5, ticks: { stepSize: 1, color: '#475569' }, grid: { color: '#334155' }, angleLines: { color: '#334155' }, pointLabels: { color: '#94a3b8', font: { size: 10 } } } },
                    plugins: { legend: { labels: { color: '#f8fafc', boxWidth: 12, font: { size: 10 } } } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function mettreAjourGraphiqueRadar() {
            if(!monRadarChart) return;
            const groupeAffiche = document.getElementById('select-groupe-formateur').value;
            if(!groupeAffiche) return;

            // 1. Notes Formateur
            const notesProf = notesFormateurLocales[groupeAffiche] || Array(listeCriteresProf.length).fill(null);

            // 2. Calcul Auto-Éval et Évaluation Pairs par critère (Sur l'échelle 1-5)
            const listeAutoEval = Array(listeCriteresProf.length).fill(null);
            const listePairsEval = Array(listeCriteresProf.length).fill(null);

            // Pour alimenter le radar par critère de manière équitable, on utilise la moyenne générale calculée
            evaluationsSession.forEach(e => {
                if(e.sujet === groupeAffiche) {
                    const noteSur5 = (e.note_structure / 20) * 5;
                    for(let i=0; i<listeCriteresProf.length; i++) {
                        if(e.evaluateur === e.sujet) {
                            listeAutoEval[i] = noteSur5;
                        } else {
                            if(!listePairsEval[i]) listePairsEval[i] = [];
                            listePairsEval[i].push(noteSur5);
                        }
                    }
                }
            });

            // Compilation des moyennes pour les pairs
            const dataPairsFinal = listePairsEval.map(val => Array.isArray(val) ? (val.reduce((a,b)=>a+b,0)/val.length) : null);

            // Injection des axes dans Chart.js
            monRadarChart.data.labels = listeCriteresProf.map(c => c.nom);
            monRadarChart.data.datasets[0].data = notesProf;
            monRadarChart.data.datasets[1].data = listeAutoEval;
            monRadarChart.data.datasets[2].data = dataPairsFinal;
            monRadarChart.update();
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
