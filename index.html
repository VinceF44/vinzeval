<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Espace Zen Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-pastel-sand: #e2c98a;
            --color-deep-blue: #1c4b84;
            --color-soft-blue: #3b6b9e; 
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen p-4 md:p-8 selection:bg-slate-700">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- EN-TÊTE DASHBOARD -->
        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/40 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-md backdrop-blur-md">
            <div>
                <span class="text-[10px] font-semibold uppercase tracking-widest px-2.5 py-1 rounded-md border" style="background-color: rgba(226, 201, 138, 0.05); color: var(--color-pastel-sand); border-color: rgba(226, 201, 138, 0.15);">
                    📊 Résultats Live
                </span>
                <h1 id="titre-session" class="text-2xl font-extrabold text-slate-100 mt-2 tracking-tight">Chargement du dashboard...</h1>
            </div>
            <button onclick="calculerMoyennes()" class="text-xs font-bold py-2.5 px-4 rounded-xl transition-all uppercase tracking-wider cursor-pointer shadow-md hover:brightness-110 active:scale-[0.98] text-white flex items-center gap-2" style="background-color: var(--color-soft-blue);">
                🔄 Actualiser
            </button>
        </div>

        <!-- GRILLE PRINCIPALE -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Colonne gauche : Sélecteur de Groupe -->
            <div class="lg:col-span-1 bg-slate-800/50 p-5 rounded-2xl border border-slate-700/40 space-y-4 shadow-md h-fit">
                <h2 class="text-xs font-bold uppercase tracking-wider flex items-center gap-2" style="color: var(--color-pastel-sand);">
                    👥 Groupes Évalués
                </h2>
                <div id="liste-groupes-onglets" class="space-y-2">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <!-- Colonne Droite : Visualisation des Scores -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Vue d'ensemble du groupe sélectionné -->
                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/40 space-y-6 shadow-md backdrop-blur-md">
                    <div class="flex justify-between items-center border-b border-slate-700/40 pb-4">
                        <div>
                            <h3 id="nom-groupe-selectionne" class="text-lg font-bold text-slate-100">Sélectionnez un groupe</h3>
                            <p id="membres-groupe" class="text-xs text-slate-400 mt-0.5 italic">Aucun groupe sélectionné</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider block">Note Globale</span>
                            <span id="note-generale-groupe" class="text-3xl font-black" style="color: var(--color-pastel-sand);">-</span>
                        </div>
                    </div>

                    <!-- Grille des critères -->
                    <div id="scores-criteres-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Les cartes de critères s'afficheront ici -->
                    </div>
                </div>

                <!-- Section Commentaires -->
                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/40 space-y-4 shadow-md">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        💬 Retours & Feedbacks de la classe
                    </h3>
                    <div id="liste-commentaires" class="space-y-3 max-h-[350px] overflow-y-auto pr-2 font-sans text-sm">
                        <p class="text-xs text-slate-500 italic">Sélectionnez un groupe pour voir les retours.</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rtzmhjvmqjwttscwhcyt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0em1oanZtcWp3dHRzY3doY3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzI0MDksImV4cCI6MjA5Njg0ODQwOX0.QGfMkLLpBKe6q6rl_5jdqNP1Cht4KIWAeZrTGYwBByo";
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');

        let tous LesGroupes = [];
        let groupeSelectionneId = null;

        async function initDashboard() {
            if (!sessionId) {
                document.getElementById('titre-session').innerText = "Erreur : ID de session manquant dans l'URL";
                return;
            }

            const { data: session } = await db.from('sessions').select('nom').eq('id', sessionId).single();
            if (session) document.getElementById('titre-session').innerText = session.nom;

            const { data: groupes } = await db.from('groupes').select('*').eq('session_id', sessionId).order('nom');
            tousLesGroupes = groupes || [];

            afficherOngletsGroupes();
        }

        async function afficherOngletsGroupes() {
            const conteneur = document.getElementById('liste-groupes-onglets');
            conteneur.innerHTML = "";

            for (let g of tousLesGroupes) {
                const { data: apps } = await db.from('apprenants').select('prenom').eq('groupe_id', g.id);
                const listePrenoms = apps ? apps.map(a => a.prenom).join(', ') : 'Aucun membre';
                g.membresStr = listePrenoms;

                conteneur.innerHTML += `
                    <button onclick="selectionnerGroupe('${g.id}')" id="btn-grp-${g.id}" class="w-full text-left p-3.5 rounded-xl border border-slate-700/40 bg-slate-900/40 hover:bg-slate-800/60 transition-all cursor-pointer block active:scale-[0.99]">
                        <div class="font-bold text-sm text-slate-200 transition-colors">${g.nom}</div>
                        <div class="text-[11px] text-slate-400 truncate mt-0.5">${listePrenoms}</div>
                    </button>
                `;
            }

            if (tousLesGroupes.length > 0) {
                selectionnerGroupe(tousLesGroupes[0].id);
            }
        }

        async function selectionnerGroupe(idGroupe) {
            groupeSelectionneId = idGroupe;
            
            tousLesGroupes.forEach(g => {
                const btn = document.getElementById(`btn-grp-${g.id}`);
                if(btn) {
                    if(g.id === idGroupe) {
                        btn.style.borderColor = "var(--color-pastel-sand)";
                        btn.style.backgroundColor = "rgba(226, 201, 138, 0.04)";
                    } else {
                        btn.style.borderColor = "rgba(51, 65, 85, 0.4)";
                        btn.style.backgroundColor = "rgba(15, 23, 42, 0.4)";
                    }
                }
            });

            const grp = tousLesGroupes.find(g => g.id === idGroupe);
            document.getElementById('nom-groupe-selectionne').innerText = grp.nom;
            document.getElementById('membres-groupe').innerText = grp.membresStr;

            calculerMoyennes();
        }

        async function calculerMoyennes() {
            if (!groupeSelectionneId) return;

            const { data: votes } = await db.from('votes').select('*').eq('groupe_evalue_id', groupeSelectionneId);
            const { data: criteres } = await db.from('criteres').select('*').eq('session_id', sessionId);

            const conteneurScores = document.getElementById('scores-criteres-container');
            const conteneurCommentaires = document.getElementById('liste-commentaires');
            
            conteneurScores.innerHTML = "";
            conteneurCommentaires.innerHTML = "";

            if (!votes || votes.length === 0) {
                document.getElementById('note-generale-groupe').innerText = "-";
                conteneurScores.innerHTML = `<p class="text-xs text-slate-500 italic col-span-2 p-2">Aucun vote enregistré pour le moment.</p>`;
                conteneurCommentaires.innerHTML = `<p class="text-xs text-slate-500 italic">Aucun feedback rédigé.</p>`;
                return;
            }

            let sommeTotale = 0;
            let nbNotesTotale = 0;

            criteres.forEach(critere => {
                const notesCritere = votes.filter(v => v.critere_id === critere.id && v.note !== null);
                let moyenneCritere = "-";
                
                if (notesCritere.length > 0) {
                    const somme = notesCritere.reduce((acc, v) => acc + v.note, 0);
                    const moy = somme / notesCritere.length;
                    moyenneCritere = moy.toFixed(1) + " / 5";
                    sommeTotale += moy;
                    nbNotesTotale++;
                }

                conteneurScores.innerHTML += `
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/30 flex justify-between items-center">
                        <span class="text-xs font-semibold text-slate-300 tracking-wide">${critere.nom}</span>
                        <span class="text-sm font-black font-mono px-2.5 py-1 rounded-md bg-slate-950 text-slate-200 border border-slate-800">${moyenneCritere}</span>
                    </div>
                `;
            });

            if (nbNotesTotale > 0) {
                document.getElementById('note-generale-groupe').innerText = `${(sommeTotale / nbNotesTotale).toFixed(1)} / 5`;
            } else {
                document.getElementById('note-generale-groupe').innerText = "-";
            }

            const unifComms = {};
            votes.forEach(v => {
                if (v.commentaire && v.commentaire.trim() !== "") {
                    unifComms[v.commentaire.trim()] = true;
                }
            });

            const hacksComms = Object.keys(unifComms);
            if (hacksComms.length > 0) {
                hacksComms.forEach(c => {
                    conteneurCommentaires.innerHTML += `
                        <div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800/80 text-slate-300 pl-4 relative before:content-[''] before:absolute before:left-0 before:top-3 before:bottom-3 before:w-1" style="before:background-color: var(--color-soft-blue);">
                            "${c}"
                        </div>
                    `;
                });
            } else {
                conteneurCommentaires.innerHTML = `<p class="text-xs text-slate-500 italic">Aucun feedback écrit pour l'instant.</p>`;
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
